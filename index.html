## 一、UPW 四大文化契約（Renee Marino）

1. **保持水分**：輕微脫水（僅 2%）就讓注意力和記憶力明顯下降
2. **打開攝影機**（線上學員）：鏡頭關著 = 旁觀模式，鏡頭開著 = 參與者模式

- Tony 在過去 **49 年**帶領超過 **5,000 萬人** 完成個人轉化

## 三、Tony 登場：決定的本質

Tony 衝上台，不介紹自己、不說議程——直接讓幾萬人的身體動起來。**身體不動，頭腦不打開。**

### 決定 = decidere（切斷所有其他選項）

> 「Decision 來自拉丁文 decidere：De = 切斷，cidere = 切。決定，字面意思是切斷所有後路。」

| 假決定（偏好） | 真決定（承諾） |
|-------------|-------------|
| 「我想減肥」 | 「把家裡所有垃圾食物丟掉，告訴三個朋友目標」 |
| 「我想創業」 | 「辭職了，退路已切斷」 |
| 「我這次要認真健身」 | 「付了教練半年費用，明天早上六點見」 |

**真決定的標誌**：採取了讓自己難以反悔的行動。

> 「歷史上最厲害的征服者，登陸後第一件事是把船燒掉。沒有退路，士兵只有一個選項——贏。」

---

## 四、為什麼是現在

> 「等待本身就是一個決定——它是你決定讓現況繼續的聲明。你不是在等。你是在選擇現在這樣。」

準備好的感覺，是由行動產生的，不是在行動之前就有的。

> **「Now is all you have. Your future lives in the decisions you make today.」**

---

## 五、火焰儀式——走火的真正意義

走火有物理解釋（木炭導熱性低，接觸時間極短），所以**是可以做到的**。但這不是重點。

**走火真正在訓練的**：讓你的神經系統建立一個實體記憶——「我在害怕的時候，仍然可以選擇行動。那個我以為會傷害我的東西，沒有傷害我。」

> 「每個人心裡都有火堆。有人的是那通打不出去的電話，有人的是那段說不出口的話，有人的是那個一直沒開始的事業。走過那片木炭，是為了讓你的身體記住：火，是可以走過去的。」

> **「Courage isn't the absence of fear — it's taking action in spite of it.」**

行動先來，感覺後來。

## 六、今日練習

寫下：**「我今天在 UPW 要達成的一件最重要的突破是：___________」**

- 「**一件**」——不是清單，是最重要的那一件
- 「**突破**」——有某個東西被打破
- 「**今天**」——不是這四天，是今天
- 第一個浮現的，是最真實的

## 一、Tony Robbins 登場

### 開場震撼

Tony 在巨大的音樂聲中登台，全場爆發。他第一句話就是：

> **「我不是來告訴你你需要什麼。我是來提醒你——你早就已經擁有它了。」**

> （I'm not here to tell you what you need. I'm here to remind you — you already have it.）

這一句話奠定了整個 UPW 的基調：不是「填充空洞」，而是「喚醒已有的」。

### 規模的衝擊

Tony 說：
- 這是他 **第 49 年** 舉辦 UPW

> **「無論你身在哪裡，你做出了這個決定。光是這一點，就已經讓你和大多數人不同。」**

## 二、COVID 虛擬攝影棚的故事

### 故事背景

Tony 分享了一個關於韌性和規模的故事：

2020 年疫情期間，傳統現場活動被禁止。Tony 的團隊面臨選擇：取消，還是轉型？

他們決定在 30 天內，從零開始建立一個世界級的虛擬直播攝影棚——這在當時被認為根本不可能。

### 過程中的堅持

- 當所有人說「不可能」時，Tony 說：「那就找到一個方法讓它成為可能。」
- 他們租用了整個酒店，搭設了 LED 牆、專業燈光、多攝影機系統
- 最終 UPW 線上版吸引了比任何一次現場活動都多的全球學員

### 故事的核心教訓

> **「你不是資源不夠，你是還沒找到方法。而方法永遠存在——只要你有足夠的理由去找。」**
>
> （It's not that you don't have the resources — you haven't found the way yet. And the way always exists when you have a strong enough reason to find it.）

## 三、身體狀態決定情緒——這是科學，不是哲學

### 生理優先於心理

Tony 解釋了神經科學的基礎：

- 情緒是由「身體狀態 + 大腦解讀」共同創造的
- 你無法靠思考直接改變情緒，但你可以靠**改變身體**快速切換情緒
- 這被稱為「身心雙向溝通（Mind-Body Communication）」

### 三個改變狀態的槓桿

| 槓桿 | 說明 | 例子 |
|------|------|------|
| 動作（Motion） | 最快速的狀態切換器 | 站起來、甩動手臂、跳躍 |
| 呼吸（Breath） | 深呼吸觸發副交感神經 | 4秒吸、7秒憋、8秒呼 |
| 語言（Language） | 你用什麼詞描述你的狀態 | 「我很累」vs「我在充電中」 |

> **「動作（Motion）創造情緒（Emotion）。如果你改變了你的動作，你就改變了你的感受。」**
>
> （Motion creates emotion. If you change your motion, you change the way you feel.）

---

## 四、集體能量的力量

### 為什麼要全體一起動

Tony 解釋了集體共振的力量：

- 當一個房間裡的人同時進入高能量狀態，個別的人更容易被帶動
- 「情緒感染」（Emotional Contagion）是神經科學中被充分驗證的現象
- 這也是為什麼現場演唱會、宗教聚會、體育比賽有那麼大的感染力

### UPW 的設計邏輯

整個 UPW 的節奏設計就是利用這個原理：
1. 先用音樂和動作把集體能量拉高
2. 在高能量狀態下傳遞信息
3. 讓信息和強烈的情緒綁定在一起，形成長期記憶

> **「你不會記得你在高中讀的大多數東西，但你會記得初戀的感覺。為什麼？因為強烈的情緒讓記憶變得持久。」**

---

## 五、互動環節：全場能量練習

Tony 帶領全場做了以下動作：
- 站起來，甩動雙臂，發出聲音
- 大喊「YES！」三次，每次比上一次更大聲
- 轉向旁邊的人（或對著鏡頭），說：「你今天要改變你的生命！」

**目的**：讓大腦確認「這是一個高重要性的事件」，從而提高之後所有信息的記憶留存率。

---

## 六、Tony 的個人背景簡述

Tony 提到了他自己的起點：

- 出生在貧困家庭，有 **4 個父親**（母親多次再婚）
- 17 歲時為了找生活費，開始看 Jim Rohn 的演講錄音帶
- 第一次接觸「人的行為是有模式可循的」這個概念，徹底改變了他的世界觀

> **「我不是因為聰明才成功的。我是因為飢渴（hungry）。飢渴是最重要的資產。」**

## 一、承諾宣誓（Commitment Pledge）

### 全場集體宣誓

Tony 帶領全場站立，進行了一個集體承諾宣誓。核心內容包括：

1. **我承諾全力以赴（Play full out）**——不是表演，是真正投入
2. **我承諾打開我的心（Open my heart）**——允許新的可能性進來
3. **我承諾對自己誠實**——面對那些我一直在迴避的真相
4. **我承諾採取行動**——不只是學習，而是立即應用

> **「做承諾容易。保持承諾才是改變的真正開始。」**
>
> （Making a commitment is easy. Keeping a commitment is where real change begins.）

---

## 二、你為什麼在這裡？

### 四個核心人生驅動力

Tony 問全場：「你來這裡，你真正想要改變什麼？」

他列出了大多數人來 UPW 的四大驅動力：

| 驅動力 | 說明 |
|--------|------|
| 身體健康與體能 | 減重、增加精力、改善睡眠、活得更有活力 |
| 人際關係 | 找到理想的另一半，或修復/深化現有的親密關係 |
| 財務與事業 | 賺更多錢、轉換職業、創業、達到財務自由 |
| 情感與幸福感 | 找到更多喜悅、擺脫長期的焦慮或沮喪 |

### 深層的真相：一切都指向同一件事

Tony 說：

> **「你以為你想要的是錢、關係、健康——但如果我給你一切，而你感覺很糟糕，那有什麼用？我們所做的一切，最終目的只有一個：改變我們的感受。」**
>
> （Everything we do, we do to change how we feel.）

這是整個 UPW 最根本的洞見之一：

- 你不是真的想要錢——你想要錢帶給你的**安全感、自由感、成就感**
- 你不是真的想要關係——你想要關係帶給你的**連結感、被愛的感覺**
- 你不是真的想要健康——你想要健康帶給你的**活力感、對身體的自信**

**因此，直接學習如何管理你的情緒，才是最高效的改變路徑。**

---

## 三、掌控兩個世界

### 外在世界（External World）

包括：財富、關係、身體、名聲、地位

- 這是大多數人全力追逐的目標
- 外在世界充滿不確定性，你無法完全控制它
- 過度依賴外在世界的人，幸福感是脆弱且不穩定的

### 內在世界（Internal World）

包括：情緒、信念、意義、專注方向、身份認同

- 這是你真正可以掌控的領域
- 內在世界的品質決定了你如何詮釋外在事件
- 兩個人面對同樣的「外在」，可以活在截然不同的「內在」

> **「你無法掌控所有發生在你身上的事情，但你可以掌控你的反應——而你的反應，決定了你的人生。」**
>
> （You can't always control what happens to you, but you can control your response — and your response determines your life.）

### 真正的自由

Tony 說，真正的自由不是沒有問題，而是：

- **面對任何問題都有足夠的內在資源去應對**
- 擁有「在任何情況下都能找到內在平靜的能力」
- 不是「外部環境讓我快樂」，而是「我的快樂不依賴外部環境」

---

## 四、為什麼高成就者也感到空虛？

Tony 提出了一個矛盾：

為什麼許多「外在世界」非常成功的人——有錢、有名、有事業、有健康——仍然感到空虛或不幸福？

答案是：**他們征服了外在世界，卻忽略了內在世界。**

例子（後續章節詳述）：
- Robin Williams（喜劇天才，但患有嚴重憂鬱症）
- 許多財富自由後仍感到虛無的企業家

> **「成就（Achievement）和幸福（Fulfillment）是兩件完全不同的事。你可以同時擁有兩者，但需要兩套不同的技能。」**

---

## 五、能量等於一切

### 為什麼能量是關鍵？

Tony 說，在他輔導了數十萬人之後，他發現一個普遍模式：

**低能量狀態 = 幾乎所有問題的根源**

- 疲憊時，你更容易憤怒、更難做出好決定、更難與人連結
- 高能量時，你更有創意、更有耐心、更容易找到解決方案

> **「一個人最大的問題，通常不是技術或知識的缺乏，而是能量的缺乏。」**

### 高能量的狀態是什麼感覺

Tony 描述：
- 就像「墜入愛河時的感覺」——你睡不夠但精神奕奕、看什麼都覺得美好
- 這不是靠外在刺激（咖啡、興奮劑）產生的，而是由身體的生化反應決定的
- 你可以**學習如何主動創造**這種狀態

---

## 一、最重要的成功原料：飢渴感

### 不是智商，不是教育，不是背景

Tony 問全場：「為什麼有些人比其他人更成功？」

他的答案是明確的：

> **「飢渴感（Hunger）是成功最重要的原料。它不是智商、不是你的家世、不是你的教育、不是你認識多少人。是飢渴感。」**
>
> （The most important ingredient for success is hunger — not intelligence, not your background, not your connections. Hunger.）

### Oprah Winfrey 的例子

Tony 提到 Oprah Winfrey：

- 出生於貧困的南方農村
- 童年遭受虐待和創傷
- 但她有一種無法被壓制的飢渴感——想要更多、想要不同
- 她沒有等「條件成熟」，她在條件非常惡劣的時候就開始了

### Richard Branson 的例子

Tony 提到 Richard Branson：

- 患有嚴重的閱讀障礙（Dyslexia）
- 在學校是最差的學生之一
- 但他有對冒險、對挑戰的無盡渴望
- 最終創建了超過 400 家公司的 Virgin 帝國

**共同點**：都不是最「聰明」的人，但都是最「飢渴」的人。

---

## 二、Tony 自己的背景

Tony 分享了他的個人故事，讓學員理解「飢渴感從哪裡來」：

- 家裡有 **4 個父親**（母親多次再婚，家庭極不穩定）
- 童年充滿混亂，沒有安全感
- 17 歲開始接觸個人成長，開始理解「模式」這個概念
- 他的飢渴感來自於：「我知道還有另一種活法，而我要找到它。」

Tony 還提到他主導的 **10 億餐計畫（Feeding America / 1 Billion Meals）**：

- 他至今已幫助超過 **10 億人次** 的飢餓問題
- 這不是公關，而是因為他童年時曾經親身體驗過飢餓的羞辱感

---

## 三、模式控制一切

### 什麼是「模式」？

Tony 說：

> **「所有的人類行為都是模式（Patterns）。你的身體是模式，你的思考是模式，你的關係是模式，你的財富是模式。」**

模式的定義：**在特定觸發條件下，自動重複出現的反應序列**。

### 模式的兩面性

| 正面模式 | 負面模式 |
|--------|--------|
| 早起運動 | 每次壓力就吃東西 |
| 遇到問題先找方法 | 遇到問題先找藉口 |
| 給伴侶讚美 | 跟伴侶說話就爭吵 |
| 在失敗中找到學習 | 在失敗後放棄 |

**關鍵**：你不是你的模式。你可以識別模式、改變模式、創造新模式。

### 為什麼改變這麼難？

Tony 解釋了「模式改變的阻力」：

1. **你不知道自己的模式是什麼**——大多數模式在意識之下運作
2. **你認同你的模式**——把模式當成「我就是這種人」
3. **模式曾經有效**——某個時刻，這個模式解決過你的問題，所以大腦保留了它
4. **你沒有強烈的理由改變**——改變需要能量，如果舊模式的代價不夠痛，你不會改

---

## 四、非凡的情緒才能創造非凡的人生

### 情緒決定行動，行動決定結果

Tony 說：

> **「如果你想要非凡的人生，你需要非凡的情緒。普通的情緒只能帶來普通的行動，普通的行動只能帶來普通的結果。」**
>
> （If you want an extraordinary life, you need extraordinary emotions. Ordinary emotions produce ordinary actions.）

### 什麼是「非凡情緒」？

不是指「一直很開心」，而是指：

- **在挑戰中依然能找到熱情**
- **面對失敗依然充滿好奇心**
- **在痛苦中依然有使命感**

這不是天生的，這是可以學習的技能。

---

## 五、讓事情更糟的陷阱：為什麼人會把事情搞砸

Tony 問了一個有趣的問題：

「為什麼人明明知道某件事會讓情況更糟，還是去做？」

答案是：**恐懼（Fear）讓人做出破壞性的選擇**。

常見的恐懼驅動行為：
- 因為害怕失去而控制伴侶（結果反而失去伴侶）
- 因為害怕失敗而不採取行動（結果確保了失敗）
- 因為害怕批評而不分享想法（結果機會從身邊流逝）

> **「大多數人的問題，不是能力不足，而是恐懼太多。恐懼是無形的自我破壞者。」**

---

## 六、領導者的三項使命

Tony 提到，真正的領導者（無論是否有正式職位）都履行三項使命：

| 使命 | 說明 |
|------|------|
| 提供答案（Provide Answers） | 在別人恐慌時，能夠說出「這是我們要做的」 |
| 激發動力（Inspire Action） | 不只是告知，而是讓人願意行動 |
| 製造結果（Produce Results） | 最終以結果說話，而不只是意圖 |

**適用對象**：不只是 CEO，也包括父母、教師、任何想要對他人產生正面影響的人。

---

## 七、失望是通往成功的鑰匙

Tony 說了一句讓全場安靜的話：

> **「失望（Disappointment）是成功的鑰匙。那些從不讓自己失望的人，永遠不會成長。」**
>
> （Disappointment is the key to success. Those who never allow themselves to be disappointed will never grow.）

解釋：
- 失望意味著你對自己有「期待」——這是好事，說明你想要更多
- 真正危險的是「提前降低期待以避免失望」——這是停止成長的方式
- 正確的做法是：讓自己失望，然後把失望轉化為動力，而不是藉口

## 一、史丹佛大學憂鬱症研究

實驗設計：Tony Robbins 介入方法 vs 最新一代抗憂鬱藥物（包含 Psilocybin）

| 組別 | 憂鬱症狀改善率 | 自殺意念清除率 |
|------|------------|------------|
| Tony 方法組 | **93% 完全清除** | **100%（降至 0%）** |
| 最新藥物組 | 約 54% 有顯著改善 | 未達 100% |

> 「所有進入研究時有自殺意念的參與者——在接受介入之後，自殺意念歸零。不是減少，是歸零。這不是我說的，這是史丹佛說的。」

**核心發現**：憂鬱不只是腦部化學失衡，也是焦點模式問題——改變焦點、身體狀態、對事件的意義詮釋，可以達到藥物無法達到的效果。

## 二、焦點決定你的現實

> **「I don't experience life. I experience the life I focus on.」**
> （我不是在經歷生命。我是在經歷我所聚焦的生命。）

**神經科學基礎**：每秒你的感官接收 **200 萬位元** 的資訊，但意識每次只能處理其中 **134 位元**（0.0067%）。誰決定哪些進入意識？**你的焦點**——透過網狀激活系統（RAS）。

**白色 Toyota RAV4 效應**：買了新車那天，路上突然到處都是同款車。這些車昨天也在，但你的 RAS 昨天沒有標記它們為「重要」。

| 維度 | 消耗性焦點 | 創造性焦點 |
|------|----------|----------|
| 有什麼 vs 沒有什麼 | 我沒有足夠的資源 | 我現在有的已夠我開始 |
| 能控制 vs 不能控制 | 我無法改變過去 | 我能改變現在的選擇 |
| 失去 vs 學到 | 這次失敗浪費了兩年 | 這兩年讓我學到了_____ |

---

## 三、痛苦的三種正確用法

1. **作為警報**：告訴你「這裡有問題，需要注意」
2. **作為指南針**：長期的不幸告訴你目前方向不是你真正想要的
3. **作為燃料**：最大的動力往往來自你最不想再回到的地方

### Tony 的感恩節故事

Tony 的童年：母親酗酒，多次再婚，家庭像隨時要爆炸的火藥庫。

有一個感恩節，家裡什麼都沒有吃的。他作為最大的孩子，看著弟妹的臉，不知道怎麼辦。

然後有人來敲門——一個陌生人，手上提著大袋子，裝滿感恩節食物：火雞、馬鈴薯、餡料，什麼都有。「我聽說你們今天可能需要這個。」然後就離開了。

> 「那個時刻改變了我的一生。不是因為我那天吃飽了。而是因為我在那天學到了：陌生人可以在乎你。我那時心裡做了一個決定：我長大之後，要成為那個出現在別人門口的人。」

這就是為什麼他後來建立每年的 **10 億餐計畫（1 Billion Meals）**——他至今已幫助超過 **10 億人次** 的飢餓問題。

**痛苦沒有消失。它變成了使命。**

## 四、生化學習法則

> **「Information plus emotion creates a memory that lasts forever.」**

你不記得高中生物課的內容，但你記得第一次暗戀的人的名字和某個下午的光線。原因：杏仁核在強烈情緒時向海馬迴發出訊號「這個事件很重要，標記為長期記憶」。

UPW 的整個設計就是這個原理：先用音樂、動作、集體能量拉高情緒，在情緒高峰傳遞核心概念。

## 五、睪固酮 vs 皮質醇：進場前就決定輸贏

| 激素 | 高水平時 | 對行為的影響 |
|------|--------|----------|
| **睪固酮** | 自信、力量感、清晰感 | 主動出擊、承擔風險、精準決定 |
| **皮質醇** | 壓力、恐懼、焦慮 | 迴避、退縮、無法清晰思考 |

**你的身體姿勢直接影響這兩種激素的分泌比例**（Amy Cuddy / 哈佛大學）。

### Tom Brady 進場前的儀式

Brady 在每場比賽開始前至少兩個小時，就開始系統性地建立「冠軍生化環境」：
- **特定的呼吸節奏**：刻意降低心率，進入副交感神經主導的清晰冷靜狀態
- **特定的身體動作**：逐步建立「我在顛峰狀態」的肌肉記憶
- **在腦中重複播放畫面**：具體的感官記憶——過去比賽中自己做出最好決定的畫面

Brady：「我在場上感覺良好，不是因為我在場上表現好——而是因為我在進場之前就確保自己感覺良好。感覺是我創造的，不是比賽給我的。」

> 「大多數人等著外部世界給他們好理由去感覺好。冠軍反過來——先建立內部狀態，讓那個狀態去影響外部結果。」

## 六、聲音改變爬蟲腦

大腦三層結構：新皮質（理性邏輯）→ 邊緣系統（情緒記憶）→ 爬蟲腦（生存本能）

**聲音直達爬蟲腦，不需要經過理性處理**——音樂能在不到一秒改變情緒；突然的巨響讓你心跳加速，你還沒思考之前身體已反應。

**你自己的聲音是最強的工具**：大聲說出確認、感謝、宣言——效果遠超在心裡默念。說話激活爬蟲腦，思考只激活新皮質。大聲複誦比默讀留存率高 50%+。

**來源**：0313-1.en.srt，約 01:25–01:45
**主講人**：Tony Robbins
**核心概念**：信念的形成機制、桌子理論、1000 次跳躍故事、創造者 vs 管理者心態、Unleash 的真義

---

## 一、信念的本質定義

> **「A belief is a feeling of certainty about what something means.」**
> （信念，是對某件事的意義感到確定的感覺。）

你沒有親眼看過地球是圓的，但你相信。為什麼？因為你收集到了足夠的「參考依據」，讓它在腦中變成事實。

**信念不是真相——信念是你認為是真相的東西。** 但這種確定感，決定了你的行動。

---

## 二、信念的形成：參考依據的堆積

參考依據可以是：
- 你親身的經歷（成功/失敗）
- 別人告訴你的話（父母、老師說你「聰明」或「沒用」）
- 觀察到別人的經歷
- 書籍、影片、媒體

**重要洞見**：參考依據不需要是「真實」的，也可以形成強烈的信念。

> 「你有沒有看過一部電影，看完之後哭了？那個故事是虛構的。沒有人真的死。但你的神經系統把它當作真實的來處理。所以你的信念可以建立在完全虛構的基礎上，但力量和建立在真實基礎上的一樣強。」

**你最核心的信念是誰建立的？**
大多數限制性信念在 7 歲之前形成——那時你幾乎沒有選擇和判斷能力，接收到的是別人的恐懼、別人的限制、別人的世界觀。

> 「你帶著的很多信念，根本不是你的。它們是別人留在你身上的行李。」

---

## 三、限制信念 vs 賦能信念

| 類型 | 定義 | 效果 |
|------|------|------|
| **限制信念** | 讓你行動空間變小的確定感 | 不嘗試、不行動、放棄更快 |
| **賦能信念** | 讓你行動空間變大的確定感 | 更敢嘗試、更持久、更有創意 |

最毀滅性的格式——加了「永遠/從來/所有/沒有人」的信念：
- 「我**永遠**做不到」
- 「事情**從來**不會對我順利」
- 「**所有**男人/女人都一樣」

> 「一個事件，加上一個永遠的詞，就變成了一個讓你困一輩子的信念。」

---

## 四、桌子理論——怎麼改變信念

**信念 = 桌面（核心想法）+ 桌腳（參考依據）**

只要桌腳夠多夠穩，桌子不倒。改變信念 = 撤掉桌腳，或換新桌子的桌腳。

**怎麼撤掉桌腳：**
- 質疑現有依據：這件事真的每次都這樣嗎？有沒有例外？
- 加入新的依據：找一個活生生的反例；讓自己有小小的成功體驗
- 行動優先於信念

> 「你不需要先相信你能做到，才能去做。很多時候正好相反——你先去做，做了之後才相信你能做到。**行動是最快的信念治療師。**」

---

## 五、1,000 次跳躍故事

在某次極限訓練中，Tony 連續進行了 1,000 次跳躍動作。

- 第 300 次：大腦說「夠了，停下來」
- 第 500 次：身體出現真實疲勞——肌肉燃燒、心跳接近極限、呼吸艱難
- 第 700 次：大腦停止辯論，進入一種不同的狀態——「大腦說不，但我的意志繼續。那個『我』，不是我的大腦。」

第 1,000 次完成後：

> 「我的乳酸濃度達到正常訓練的四倍，消耗了約 11,300 卡路里。我的身體告訴我那是不可能的。但它發生了。而那一天之後，我的大腦再也無法用同樣的方式告訴我『不可能』了——因為它見過了。」

**這個訓練的目的**：讓身體留下一個「不可能，但發生了」的記憶。當身體做到大腦認為不可能的事，大腦必須更新模型——信念系統的邊界永久向外移動。

**這也是為什麼 UPW 要走火**——不是讓你的腳不怕熱，而是讓大腦有一個「我做到了我以為做不到的事」的參考依據。

---

## 六、創造者 vs 管理者心態

| 維度 | 管理者心態 | 創造者心態 |
|------|----------|----------|
| 核心問題 | 「我如何不讓事情變糟？」 | 「什麼是可能的？」 |
| 對風險 | 規避 | 視為必要代價 |
| 對資源 | 「我有哪些資源？」 | 「如果資源不是問題，我能做什麼？」 |
| 對失敗 | 需要避免的 | 數據，是下一步的依據 |

**管理者心態的盲點**：為管理「已知」而設計，面對「未知」時失效。而改變、突破、成長，全都需要進入未知。

**Oprah Winfrey 的例子**：她建立媒體帝國，不是在她「準備好了」的時候。幾乎所有條件都對她不利，她從來沒有等到「對的時機」——她把當下的條件當作她的材料。

創造者的口頭禪：**「我現在有什麼？我能用它做什麼？」**

---

## 七、Unleash——釋放，不是添加

UPW 名字的精確選擇：**Unleash**（釋放）而非「Acquire/Build/Develop」。

> 「你來這裡，不是因為你沒有力量。你來這裡，是因為你一直在壓制你的力量。我的工作是幫你移除阻礙，不是給你你沒有的東西。」

**五個主要阻礙機制**：
1. 限制信念（天花板）
2. 恐懼（失敗/成功/批評/改變）
3. 負面內在對話（對自己說的話，如果對朋友說，那段友誼早就結束了）
4. 低能量狀態（所有資源在維持基本運作，沒有剩餘去突破）
5. 舊的身份認同（最強的限制信念，關於你是誰，而不只是你能做什麼）

就像從水管裡移除阻塞物——水不需要被「製造出來」，它一直都在，只是被擋住了。

---

## 八、心臟電磁場：集體能量的物理基礎

根據 HeartMath Institute：
- 心臟電磁場比大腦強 **100 倍**（電場）
- 延伸到體外約 **3 公尺**
- 兩個人靠近時，心臟電磁場互相影響

50,000 人同時進入高能量狀態 → 心臟電磁場共振 → 對每個個體產生真實的生理影響，不只是「氣氛好」。

**主講人**：Tony Robbins
**核心概念**：三大模式技能、Howard Schultz 星巴克故事、Jon Bon Jovi Soul Kitchen、AI 時代策略、高估一年低估十年

## 一、三大模式技能

歷史上所有重要突破都來自這三個技能：

### 技能一：模式識別（Pattern Recognition）

在紛亂的資訊中看出重複出現的規律。

**最重要的歷史案例：四季的發現**

> 「在人類歷史的某一個時刻，有人第一次意識到：冬天不是懲罰，它是一個週期。它會結束，之後會有春天。那個發現，改變了人類文明。」

在那個發現之前，人們每次看到冬天都以為是災難，反應是恐慌和絕望。之後，人們開始夏天耕種、秋天收穫、冬天計劃、春天播種。**農業文明從這個模式識別開始。**

### 技能二：模式運用（Pattern Utilization）

識別出成功模式後，策略性地複製到新場景。

**Howard Schultz 與星巴克的故事**

1983 年，Schultz 是星巴克行銷總監（那時星巴克只是西雅圖一家賣咖啡豆的小店）。

出差去米蘭，走進一家當地咖啡吧，他看到的不只是咖啡——他看到了一個完整的社交儀式：

- 咖啡師操作濃縮咖啡機，像在表演
- 顧客站在吧台旁和咖啡師、旁邊的陌生人說話
- 整個空間充滿輕鬆、連結、屬於社區的感覺
- 人們去那裡不只是喝咖啡，而是那 15 分鐘的「第三空間」體驗——不是家，不是辦公室

Schultz 在米蘭走訪了幾百家咖啡吧，越來越確定：義大利有一種美國完全沒有的模式。他回美國把想法告訴老闆——老闆說這太瘋狂了。

Schultz 自己出去找投資人，開了第一家義大利風格咖啡吧。第一天開業，那條街的人像從沒喝過咖啡一樣不停進來。

後來他買下星巴克，把整個品牌改造成「第三空間體驗」——超過 35,000 個據點，遍佈 80 多個國家。

> 「Howard Schultz 沒有發明咖啡，也沒有發明咖啡館。他識別了義大利已經存在幾百年的成功模式，然後把它運用到完全陌生的市場。這就是模式運用的力量。」

### 技能三：模式創造（Pattern Creation）

打破現有模式的限制，創造全新的解決方案。最稀有、也最有價值。

**Jon Bon Jovi 的 Soul Kitchen**

Jon Bon Jovi 在紐澤西州開了一家餐廳，叫 JBJ Soul Kitchen。

**這家餐廳沒有標價的菜單。**

你走進去，點你想要的食物，吃完後付你願意付的價格——或者，如果付不起，用一個小時的服務（清洗/送餐/打掃）換一頓飯。

沒有羞辱，沒有區別對待。點同樣食物的有西裝筆挺的商人，也有流浪漢。

> 「Jon Bon Jovi 沒有只是捐款給食物銀行。他創造了一個讓有錢人和需要幫助的人坐在同一張桌子旁、每個人都保留了尊嚴的模式。這是模式創造。」

---

## 二、AI 時代的生存策略

### Tony 的 AI 助理「Barney」

Tony 有一個 AI 代理助手叫 Barney，負責：管理日程、篩選重要信件、為每個重要會議準備背景摘要、追蹤承諾和待辦事項。

「Barney 沒有壞天，沒有自我，不需要加薪，速度比任何人類助理快三倍以上。」

但 Barney 做不到的事：

> 「Barney 無法感受到一個人眼淚背後的原因。無法在一個人快要放棄的那一刻說出讓他繼續走下去的話。無法建立真正的人際信任。這些是你應該把時間花在上面的事。」

**Square（Block）大規模裁員案例**：不是因為公司表現不好，而是 AI 現在可以完成原本需要這些人才完成的工作。這不是個例，是所有行業都在發生的事。

| 被 AI 快速取代的能力 | AI 目前無法取代的能力 |
|-------------------|--------------------|
| 重複性資料處理與整理 | 情感智慧與人際連結 |
| 按照規則和流程執行任務 | 創造性問題解決（突破現有框架） |
| 信息搜索、整理、摘要 | 道德判斷與價值導向的決策 |
| 預測性分析（基於歷史數據） | 激勵他人、建立信任、帶領團隊 |

> 「你的工作是在執行模式（Pattern Execution），還是在創造模式（Pattern Creation）？如果主要是執行——AI 可以比你快、比你便宜、比你準確。但如果你在設計那些規則和流程，你是創造模式的人。創造模式的人，AI 取代不了。」

---

## 三、你高估了一年，低估了十年

> **「大多數人高估他們在一年內能做到的事，但嚴重低估他們在十年內能做到的事。」**

原因：大腦是短期動物，天生對「現在可見的結果」有強烈心理需求；也低估了**複利效應**（技能、關係、健康的成長曲線：先緩慢後爆發，大多數人在爆發前就放棄了）。

> 「你現在做的每一個選擇，不只是決定今天——它決定十年後的你是誰。問題不是你今天做到了什麼，問題是你今天的方向是否正確。」

---

  {id:"day1-第08章",day:1,n:8,title:"第08章：人生四季與身份認同",shortTitle:"人生四季與身份認同",content:`# 第08章：人生四季與身份認同

**來源**：0313-1.en.srt，約 02:05–結尾
**主講人**：Tony Robbins
**核心概念**：人生四季完整解析、Tony 66 歲冬季自述、身份認同決定你的未來

---

## 一、人生四季框架

> 「如果你在秋天種下玉米種子，你就是在對抗自然。如果你在春天去收穫，你只會失望。你必須知道你在哪個季節，才能做出與季節相符的行動。」

農民的智慧：懂得四季的農民不會在冬天恐慌。他的從容不是因為沒有困難——而是因為他理解週期。**大多數人在冬天崩潰，是因為他們不知道這只是週期，不是永久的狀態。**

---

### 春（Spring）：0–21 歲——播種與學習期

核心特徵：大腦可塑性最高、身體恢復能力最強、社會責任最輕、失敗代價最低。

**核心任務**：廣泛探索，找到你熱愛的事物。

常見陷阱：
1. **太早定型**：17 歲就說「我就是這種人」——往往把人困住幾十年
2. **過度保護**：沒有機會面對失敗，進入夏天時沒有抗壓能力
3. **把春天的失敗當永久標籤**：「我不是讀書的料」「我天生沒有運動細胞」

> 「青春期的失敗，是春天的霜凍。農民不會因為霜凍就說『這塊地無法耕種』。他等霜凍過去，繼續種。」

---

### 夏（Summer）：22–42 歲——建立與奮鬥期

核心特徵：精力最充沛、需要全力建立（事業/關係/財富/習慣）、挑戰最多。

> 「夏天是最考驗你的季節。不是因為夏天壞——而是因為夏天熱。炎熱是夏天的本質，不是異常。如果你在夏天抱怨太熱，你就誤解了你的季節。」

**夏天的戰士（Summer Soldier）**——在最熱的時候，仍然在田野裡。

常見陷阱：
1. **在夏天做春天的事**：36 歲了還在「探索」，而不是「建立」
2. **在夏天就放棄**：大多數人失敗的真正原因——在炎熱中撤退
3. **忘記冬天會來**：沒有建立財務緩衝、沒有維護身體健康

---

### 秋（Fall）：43–63 歲——收穫與顛峰期

核心特徵：能力達到顛峰（技能/判斷力/人際網絡都在最成熟的狀態）、春天和夏天種下的種子現在結果了。

> 「秋天是最美麗的季節。所有顏色都在這個時候最鮮豔。那是樹木把一生積累的能量集中到最後的輝煌中——秋天的顏色，是樹木的最後一次盛放。」

常見陷阱：
1. **還在用夏天的方式打拼**：用 22 歲的強度打 53 歲的身體
2. **沒有學會享受收穫**：一輩子只知道播種，無法停下來感受已有的一切
3. **不傳承智慧**：最大的浪費是智慧的死亡

---

### 冬（Winter）：64 歲以上——整合與傳承期

核心特徵：精力開始下降（但可用智慧和槓桿彌補）、靈性深化、傳承的時期。

**Tony 2026 年 66 歲，坦然談冬季**：

> 「我現在在冬天。我接受這一點。我不試圖假裝我在夏天。我不會再做我 30 歲時做的事了——不是因為我不想，而是因為那不是我的季節了。我的季節，是整合和傳承。」

> 「我感覺比 30 歲時更清晰、更有力量。不是身體上的力量——是使命的力量，是智慧的力量，是知道什麼才是真正重要的東西的力量。30 歲的我在追逐成功的感覺。66 歲的我清楚地知道我的使命。這兩件事，不一樣。」

**Tony 在冬季的三個使命**：
1. 傳遞 49 年的智慧——每一次 UPW 都付出全部
2. 幫正在夏季和秋季的人避開錯誤——讓人少走十年彎路
3. 讓他開創的工作繼續——種下的種子可以在他離開後繼續成長幾百年

---

## 二、身份認同是一切的根源

**身份認同** = 你相信自己是什麼樣的人的核心故事。

包含：
- 「我是一個……的人」（努力的人 / 容易放棄的人）
- 「我一向都……」（很害羞 / 很敢冒險）
- 「我這種人……」（適合做什麼 / 不適合做什麼）

身份認同在無意識中決定你如何回應你的季節：

- 身份認同是「我是一個奮鬥者」→ 在秋天也繼續拼命，無法享受已建立的一切
- 身份認同是「我不需要幫助的人」→ 在冬天拒絕傳承和連結，智慧隨自己消逝
- 身份認同是「我已經老了」→ 在 50 歲就放棄秋天最燦爛的可能性

> **「你說你是誰，決定了你能做什麼。Identity 不只是關於你的過去——它更是關於你允許自己有什麼樣的未來。改變你的身份認同，你就改變了你能進入的可能性空間。」**

**改變身份認同的四步驟**：
1. 意識到你目前的身份認同（「我是一個……的人」）
2. 問：這個身份認同是我選擇的還是別人給的？在服務我還是在限制我？
3. 創造一個新的身份認同陳述（不需要現在就「相信」它，只需要開始使用它）
4. 採取與新身份認同一致的行動——每一次這樣的行動都是新的參考依據

---

## 三、高估一年低估十年——實踐層面

**不要問**：「我今年能做到多少？」
**要問**：「如果我在這個方向持續努力十年，我能成為什麼樣的人？」

注意：不是「我能得到什麼」，而是「我能成為誰」。**你成為的那個人，自然會吸引你想要的結果。**

對抗短視放棄的三個方法：
1. 設定「最低可接受進展」標準：不問「今天離目標多近」，問「今天有沒有往那個方向前進一步」
2. 慶祝過程，不只是結果：每一次練習和嘗試，都在建造未來成功的基礎
3. 目標從「結果」改為「成為誰」：不是「我要賺到一百萬」，而是「我要成為能夠創造一百萬價值的人」

---

  {id:"day1-第09章",day:1,n:9,title:"第09章：傾聽你的身體",shortTitle:"傾聽你的身體",content:`# 第09章：傾聽你的身體

**來源**：0313-2.en.srt，約 00:00–00:20
**核心概念**：能量是決定一切的關鍵因素、低能量等於威脅偵測模式、Jim Rohn 哲學、三項運動王朝故事

---

## 一、知道 ≠ 做到——能量才是根源

> **「你全都知道：應該運動、早睡、吃得更健康、追求你真正想要的事業。那你為什麼還沒做到？答案不是你不夠努力，不是你不夠聰明。答案是：你沒有能量。」**

> **「能量不是你生命中的一個因素——它是決定所有其他因素的因素。當你能量高的時候，所有問題都是可解的。當你能量低的時候，同樣的問題讓你絕望。改變的不是問題，是你的能量。」**

---

## 二、低能量 = 演化 Bug

低能量時大腦自動切換「威脅偵測模式」——在原始時代是救命機制，在現代是災難性 bug。

| 低能量時的想法 | 高能量時的想法 |
|-------------|------------|
| 「這件事不可能成功」 | 「讓我們找找看有什麼辦法」 |
| 「他根本不在乎我」 | 「他最近壓力很大，我可以怎麼幫他？」 |
| 「我就是沒有那種才能」 | 「我還不夠熟練，但我可以練習」 |
| 「我這輩子就這樣了」 | 「我現在在哪個位置，下一步可以做什麼？」 |

> 「你以為你在『冷靜思考之後』得出了這些結論。你沒有。你是在低能量、威脅偵測模式的大腦過濾下看到的這個世界。那不是現實，那是你的能量水平創造的幻覺。」

---

## 三、高能量 = 墜入愛河的狀態

想像你墜入愛河時的感覺：睡眠少但精神奕奕、對人更有耐心、問題出現第一反應是「我們怎麼解決」。

> 「這不是只有初戀三個月才有的特別狀態。這是你的身體在生化最佳化時的自然狀態。你可以學習如何主動創造這種狀態——不依賴愛人、不依賴咖啡、不依賴任何外部刺激。」

---

## 四、五大生理槓桿

| 槓桿 | 核心要點 |
|------|--------|
| **睡眠** | 7–9 小時深度睡眠；睡眠不足，所有其他優化都是在漏桶裡加水 |
| **水分** | 脫水 2% 就造成認知下降 15%；早晨起床第一件事喝 500–1000ml |
| **飲食** | 低糖低發炎；高糖→血糖衝高→下午能量崩潰 |
| **運動** | 每天 30 分鐘有氧；運動是在製造能量，不是消耗能量 |
| **呼吸** | 4-7-8 呼吸法（吸4、憋7、呼8）；90 秒內切換副交感神經 |

**心理能量三來源**：使命感（強烈的「為什麼」）、感恩（可測量的生化效應）、焦點管理（只把注意力放在能控制的事上）

---

## 五、Jim Rohn 哲學：「如果你不能，你就必須」

Jim Rohn 是 Tony 17 歲時最重要的導師。Tony 說：「他是第一個讓我相信，我的過去不等於我的未來的人。」

Jim Rohn 最著名的一句話：

> **「If you can't, you must. If you must, you can.」**
> （如果你不能，你就必須。如果你必須，你就能。）

**Tony 的解讀**：大多數人說「我做不到」時，真正意思是「這件事讓我不舒服、我沒把握、我的能量不夠」。「不能」恰恰指向你最需要突破的地方——你最有成長空間的邊界。而當你把「不能」轉換成「必須」，你的神經系統會調動所有可用資源去找解決辦法。

**重量訓練比喻**：

> 「你去健身房做重量訓練。肌肉成長發生在哪裡？不是在輕鬆的第一下、第二下、第三下。肌肉成長發生在最後幾下——你的大腦說『我撐不住了』，但你還是做了的那幾下。你的能力成長，發生在同一個地方——在你舒適區的邊緣，不是在你舒適區的中心。」

---

## 六、三項運動王朝的故事——信念創造冠軍

Tony 說，他輔導過幾十年的運動員和教練，有一位教練創下了幾乎不可能同時發生的成就：
- 帶領一支球隊贏得 **3 個 NBA 冠軍**
- 帶領一支球隊拿到 **MLB 世界大賽冠軍**
- 帶領一支球隊贏得 **NHL 冠軍**

三個完全不同的運動項目。有人問這位教練：你的秘密是什麼？

他沒有說戰術，沒有說訓練計劃。他說：

> **「我讓球員相信他們能做到他們以為不可能的事。一旦他們真心相信，他們就做到了。信念改變了他們能調動的生理和心理資源。」**

> 「這不是心靈雞湯。當你的大腦真正相信你能做到某件事，它會調動不同的資源、尋找不同的解決方案。信念不只是感覺——它是決定你能動用多少能量和能力的實際開關。」

---

## 七、傾聽身體的訊號

**常見身體訊號與深層意義**：

| 身體訊號 | 可能的深層意義 |
|--------|------------|
| 長期慢性疲勞 | 能量管理出根本問題；睡眠品質、飲食或長期壓力積累 |
| 肩頸持續緊繃 | 壓力和焦慮積累；「你扛的東西太多了，需要卸下一些」 |
| 反覆消化問題 | 情緒壓力直接影響腸道（第二大腦，超過 1 億個神經元） |
| 早晨醒來仍疲憊 | 睡眠品質問題，不只是睡眠量的問題 |

**如何真正傾聽**：
- 不要壓制不舒服的訊號（疼痛和疲勞是警報，不是噪音）
- 每天給自己靜默時間，追蹤你的能量模式
- 注意情緒和身體的連結（焦慮住在胸口、憤怒住在肩膀、悲傷住在喉嚨）

---

## 本章重點摘要

| 主題 | 核心洞見 |
|------|---------|
| 能量是主要模式 | 能量不是生命的一個因素，是決定所有因素的因素 |
| 低能量 = 威脅偵測模式 | 疲憊的大腦看見問題，看不見機會 |
| 高能量 = 墜入愛河 | 生化最佳化時的自然狀態，可以主動創造 |
| 五大生理槓桿 | 睡眠、水分、飲食、運動、呼吸 |
| Jim Rohn 哲學 | 「不能」指向最需要突破的地方；「必須」激活最大資源 |
| 三項運動王朝 | 讓人相信不可能，才是最高的教練技術 |
| 傾聽身體 | 讀訊號，不壓制訊號 |

---

  {id:"day1-第10章",day:1,n:10,title:"第10章：語言創造現實",shortTitle:"語言創造現實",content:`# 第10章：語言創造現實

**來源**：0313-2.en.srt，約 00:20–00:40
**核心概念**：確信感螺旋、Roger Bannister 四分鐘一英里、UCLA 視覺化研究、語言如何創造現實

---

## 一、確信感螺旋——成功和失敗的真正起點

大多數人以為成功公式是：有能力 → 行動 → 結果 → 信心。Tony 說這個順序是錯的。

**真正的上行螺旋**：確信感 → 潛力釋放 → 全力行動 → 良好結果 → 更強確信感……

**下行螺旋**：懷疑自己 → 潛力壓制 → 行動不足 → 結果不好 → 確信感下降……

> 「失敗的人越來越容易失敗——不是因為他們的能力越來越差，而是因為他們的確信感在每一次失敗後都又下降了一點。他們開始相信失敗是關於自己這個人的真相。」

**關鍵洞見**：確信感可以在結果之前建立。你的大腦在生動的想像和真實體驗之間幾乎無法區分。

---

## 二、Roger Bannister 與四分鐘一英里——史上最偉大的信念突破

**1954 年之前**，「四分鐘跑完一英里」被醫學界和體育界視為人類生理上的不可能——生理學家發表論文說肺部無法在那個時間提供足夠的氧氣，有醫生甚至說可能導致心臟破裂。這個「不可能」，在人類有計時跑步的整個歷史中從未有人打破。

**沒有人打破它——因為沒有人相信它可以被打破。**

Roger Bannister 不是職業跑者，而是一個英國醫學院學生。他的特別之處在於：他知道醫學，他的結論和「專家」不同——他認為四分鐘的屏障是**心理的屏障，不是生理的屏障**。

他決定用視覺化來突破它。訓練方法是每天在腦海中反覆「跑完」四分鐘一英里——不是模糊地想「我要打破紀錄」，而是非常具體、感官豐富地體驗整個過程：腳踩在跑道上的感覺、呼吸的節奏、每一圈的配速、衝過終點線時的感受、計時器上顯示的數字。他讓神經系統在身體還沒做到之前，先「體驗」了成功。

**1954 年 5 月 6 日，英國牛津**：Roger Bannister 以 **3 分 59.4 秒** 完成了一英里。那個存在了幾十年的「不可能」，消失了。

**但這個故事最精彩的部分，是接下來的 46 天。**

Bannister 打破紀錄後的 46 天內，另一位跑者 John Landy 也跑進了四分鐘。這一年內，又有數位跑者打破了四分鐘。在 Bannister 之前，這個紀錄從未被突破；在 Bannister 之後，一年內有多人做到了。

> 「在那 46 天裡，改變的不是他們的身體。改變的是他們的信念。他們看到了一個人做到了，他們的大腦就沒有辦法再繼續相信這是不可能的。信念改變了，潛力就釋放了，結果就跟著改變了。一個人的突破，解開了所有人的枷鎖。」

---

## 三、UCLA 籃球視覺化研究——你的大腦不知道「假的」

**研究設計**：大學籃球員分三組，持續 30 天：
- A 組：每天實際練習投籃 30 分鐘
- B 組：完全不訓練（對照組）
- C 組：每天 30 分鐘視覺化——在腦海中完美投籃，感受球的重量、聽到球進框聲音、感受喜悅，但**身體完全不動**

| 組別 | 投籃命中率變化 |
|------|------------|
| A 組（實際訓練） | 提升 **24%** |
| B 組（無訓練） | 幾乎無變化 |
| C 組（只有視覺化，身體不動） | 提升 **23%** |

C 組的提升幾乎和 A 組一樣——而他們的身體在 30 天裡從未實際投過一個球。

> 「你的大腦無法分辨生動的想像和真實的體驗。如果你反覆在腦海中做某件事，你的神經迴路就會按照你的想像進行刻槽——就像一條被人反覆走過的路，越走越清晰。」

**有效視覺化的四個要素**：感官豐富（不只視覺，要有觸覺/聽覺/肌肉感）、細節具體、情緒投入、反覆練習。

---

## 四、語言創造現實

> **「你的語言不是在描述你的現實——你的語言在創造你的現實。」**

當你說一個詞，大腦不只是「聽到」它——它激活與這個詞相關的整個神經網絡，包括情緒、記憶、身體感覺、行為傾向。

**語言的四個層次**：

| 層次 | 消耗性語言 | 賦能性語言 |
|------|---------|---------|
| 描述感受 | 「我很沮喪」 | 「我只是需要一點調整」 |
| 描述情況 | 「這是個大問題」 | 「這是個有趣的挑戰」 |
| 描述自己 | 「我就是容易焦慮的人」 | 「我在某些時候會感到焦慮」 |
| 描述可能性 | 「我做不到」 | 「我還沒學會怎麼做」 |

**「緊張」變「興奮」——一個詞改變一切**

從神經科學角度，緊張和興奮的生理狀態幾乎完全相同（心跳加速、腎上腺素上升、注意力高度集中）。但：
- 「緊張」→ 威脅解讀框架：「有危險，需要防禦」
- 「興奮」→ 機會解讀框架：「有重要的事情要發生了，全力以赴」

哈佛大學 Alison Wood Brooks 研究：要公開演講的人上台前說「我很興奮」，表現顯著優於說「我很緊張」的人。

> 「成功的人不是沒有上台前的心跳加速。他們也有。只是他們說的是：『我很興奮。』」

---

## 五、四大確信感工具

1. **回顧成功歷史**：寫下三個「我做到了我以為不可能的事」的例子——這是確信感的燃料
2. **模仿頂尖者**：如果找不到足夠的自己的成功歷史，先「借用」別人的——Bannister 的突破讓其他跑者借用了「這是可能的」這個信念
3. **行動創造確信感**：不需要等到有信心了才行動；每一次小行動和成功，都在為確信感賬戶存款
4. **Act as if（假裝直到做到）**：以「你已經有確信感的人」的姿勢、語氣、方式行動；神經系統無法長期分辨假裝和真實

**核心概念**：情緒之家（Emotional Home）、習慣性情緒不等於身份認同、六大人類需求

---

## 一、情緒之家（Emotional Home）

> **「你的情緒之家，是你無論發生什麼事，最終都會回去的地方。不是你選擇的家，而是你的神經系統習慣性回去的地方。就像你從外地旅行回來，你的身體自動開往家的方向——你的情緒也是一樣。」**

**同一件事，不同情緒之家，完全不同的反應**：

情境：伴侶說七點回家，七點半了還沒回來，電話沒接。
- **擔憂型**（情緒之家 = 恐懼）：「是不是出什麼事了？是不是發生意外了？」
- **憤怒型**（情緒之家 = 憤怒）：「他根本不在乎我，每次都這樣，不尊重人」
- **平靜型**（情緒之家 = 信任）：「應該是被什麼事耽誤了，等一下再說」

伴侶遲到了三十分鐘，這是事實。但三個人活在三個完全不同的情緒世界裡。

> 「事件不決定你的情緒。你的情緒之家決定你如何解讀事件。改變情緒之家，你就改變了你的整個主觀現實。」

---

## 二、習慣性情緒 ≠ 身份認同

做完情緒清單後，很多人的第一反應是：「哦，原來我真的是一個焦慮的人。」Tony 說，這正是最危險的陷阱。

> **「你習慣性地感到焦慮，不代表你是一個焦慮的人。你習慣性地憤怒，不代表你是一個憤怒的人。這只是一個模式，不是你的本質。模式是可以改變的。」**

**把模式當作身份認同的兩個破壞效果**：
1. 把模式固化為永久事實——讓改變感覺像是在「背叛自己的本性」
2. 交出改變的責任——「我天生如此，這是我的個性，沒有辦法」

| 維度 | 情緒反應（正常） | 情緒模式（需要注意） |
|------|---------------|----------------|
| 觸發條件 | 特定的重大事件 | 幾乎任何事件都能觸發 |
| 強度 | 與事件的重要性相符 | 通常過度強烈，與事件不成比例 |
| 持續時間 | 事件結束後逐漸消退 | 長期持續，成為「預設底色」 |

---

## 三、六大人類需求

> **「所有的人類行為——所有的行為，沒有例外——都是在試圖滿足這六個需求中的一個或多個。一旦你理解了這一點，你看待人類行為的方式將永遠不同。」**

### 需求一：確定性（Certainty）
安全感、預測性、舒適感——「我知道接下來會發生什麼，我是安全的。」
- 健康滿足：穩定的習慣、可靠的關係、財務緩衝
- 不健康滿足：逃避所有挑戰和風險（停止成長）、控制伴侶（關係破裂）

### 需求二：多樣性（Uncertainty / Variety）
刺激感、驚喜、變化——「我的生命中有新鮮感，我沒有停滯。」
- 健康滿足：旅行、學習新技能、在關係中創造新體驗
- 不健康滿足：不斷跳槽、破壞穩定關係、用問題和戲劇性事件製造刺激

### 需求三：重要感（Significance）
被看見、被認可、有價值——「我很重要，我的存在有意義。」
- 健康滿足：在有意義的工作上卓越、被尊重的人認可、真實地貢獻
- 不健康滿足：批評他人（踩低別人讓自己感覺更高）、製造問題和危機來成為焦點

> 「很多人為了感覺重要，做出了讓自己後悔一輩子的事——不是因為他們壞，而是因為他們太需要感覺自己有意義了。理解這一點，你就能理解很多讓你困惑的人類行為。」

### 需求四：連結感 / 愛（Connection / Love）
歸屬感、被愛、與他人的深度連結——「我不是孤單的，我有人愛我，我愛人。」
- 健康滿足：深度、真實的人際關係、表達愛和被愛、社群歸屬感
- 不健康滿足：依賴性關係、為了不孤單而降低標準、用物質來「買」連結感

### 需求五：成長（Growth）
持續進步、學習、成為更好的版本——「我在變得更好，我沒有停滯。」

> 「當你覺得自己在進步的時候，你就算日子過得很辛苦，也能感到某種深層的滿足感。反過來，當你覺得停滯了，即使外在條件很好，你仍然感到空虛——那是成長需求沒有被滿足。」

### 需求六：貢獻（Contribution）
為比自己更大的事物服務——「我的存在讓世界更好了一點。」

> 「當你幫助別人的時候，你自己的問題會暫時消失。不是因為問題不見了，而是因為你的焦點從『我』移到了『我們』。貢獻是讓你超越自我最有效的方式。」

---

## 四、個性需求 vs 靈性需求

- **前四個（確定性/多樣性/重要感/連結感）**：個性需求——每個人都有，是基本的生存和社交驅動力
- **後兩個（成長/貢獻）**：靈性需求——更高層次的滿足，讓人感到真正的幸福和意義

> 「你可以把前四個需求都滿足了，但如果沒有成長和貢獻，你仍然會感到空虛。很多『成功』的人的痛苦，就是因為他們太擅長滿足前四個需求，卻忽略了後兩個。」

---

## 五、情緒之家與未滿足需求的對應

| 主要情緒之家 | 通常反映的未滿足需求 |
|------------|----------------|
| 焦慮 / 擔憂 | 確定性需求長期不滿足 |
| 憤怒 | 重要感或公平感受到威脅 |
| 孤單 | 連結感需求持續不滿足 |
| 無聊 / 空虛 | 多樣性、成長和貢獻需求不滿足 |
| 喜悅 / 感恩 | 六大需求都有被適度、健康地滿足 |

---

**來源**：0313-2.en.srt，約 01:00–01:20
**核心概念**：三大人生決定（焦點/意義/行動）、六大需求的陰暗面、三需求成癮定律

---

## 一、三大人生決定

> **「你所做的每一個決定，最終都可以歸結為這三個決定。如果你能掌控這三個決定，你就能掌控你的生命品質。」**

**完整鏈條**：焦點 → 意義 → 情緒 → 行動 → 結果 → 人生

### 第一個決定：焦點放在哪裡？
> **「焦點就是感受。你聚焦在什麼，你就感受到什麼。」（Focus equals feelings.）**

| 軸 | 消耗性焦點 | 賦能性焦點 |
|----|---------|---------|
| 有什麼 vs 缺什麼 | 我還沒有的東西 | 我已經擁有的東西 |
| 能控制 vs 不能控制 | 我改變不了的事 | 我能選擇和改變的事 |
| 過去 vs 現在/未來 | 我的失敗和遺憾 | 我現在能做什麼 |

### 第二個決定：賦予事件什麼意義？
> **「意義就是情緒。同一件事，你給它不同的意義，你就有不同的情緒。」（Meaning equals emotion.）**

同一件事（被拒絕）→ 不同意義 → 完全不同的行動：
| 意義 | 情緒 | 行動 |
|------|------|------|
| 「這證明我不夠好」 | 羞恥、絕望 | 停止嘗試 |
| 「更好的機會在後面」 | 平靜、好奇 | 繼續尋找 |
| 「讓我知道需要加強哪裡」 | 動力 | 主動尋求反饋 |

Viktor Frankl 在納粹集中營失去父母、妻子、幾乎所有親人，仍然選擇賦予苦難意義，在集中營牆上用指甲刻下《活出意義來》的核心思想。他說：「人可以被奪走一切，除了一件事——在任何給定的環境中選擇自己的態度的自由。」

### 第三個決定：採取什麼行動？
前兩個決定決定情緒狀態，情緒狀態決定行動。改變焦點和意義，行動和結果自然跟著改變。

---

## 二、六大需求的陰暗面

**每個需求都可以用正面或負面的方式滿足。大腦不在乎哪種方式——只要需求被滿足，它就繼續重複那個行為。**

**確定性的陰暗面**：逃避所有挑戰（確定的失敗比不確定的可能更「安全」）、控制伴侶（關係變成監獄）、堅持已知的痛苦拒絕改變

**多樣性的陰暗面**：不斷換工作（遇到困難就說「也許這不適合我」）、在關係中製造衝突（無意識地需要刺激）、不忠誠

**重要感的陰暗面**（最容易引發破壞性行為）：
- 批評他人——踩低別人讓自己感覺更重要，是職場毒人的心理機制
- 製造問題和危機以成為焦點
- 拒絕接受任何幫助（「我不需要任何人」）

> 「很多你一直無法理解的人的行為——『他為什麼要這樣做？』——當你用重要感的需求來理解它，你就懂了。他不是在傷害自己，他是在以他僅有的方式讓自己感覺重要。」

**連結感的陰暗面**：過度犧牲自己確保被需要、忍受不健康的關係（害怕孤單勝過害怕痛苦）、降低標準只為了不孤單

---

## 三、三需求成癮定律

> **「任何行為，只要同時滿足三個以上的需求，就會讓人上癮——無論這個行為是正面還是負面的。」**

**毒品/酒精成癮**（同時滿足 4 個需求）：
| 需求 | 如何被滿足 |
|------|---------|
| 確定性 | 每次都有效，「確定的」情緒改變 |
| 多樣性 | 帶來不同的感官體驗 |
| 重要感 | 「我能掌控自己的感受」（錯誤的掌控感） |
| 連結感 | 吸毒圈子提供即時歸屬感 |

戒掉它 = 同時失去四個需求的滿足來源——這就是為什麼成癮那麼難戒。

**社群媒體成癮**（同時滿足 4 個需求）：多樣性（無限新內容）、重要感（按讚和留言）、連結感（與人「連結」的感覺）、確定性（打開手機一定有新東西）

---

## 四、分析自我破壞行為的工具

選一個你一直想改變、卻一直無法改變的行為：
1. 這個行為在滿足我的哪些需求？
2. 它同時滿足了幾個需求？（超過三個 = 難怪戒不掉）
3. 有沒有更健康的方式，同樣可以滿足這些需求？

| 問題行為 | 背後的需求 | 更健康的替代 |
|--------|---------|----------|
| 暴飲暴食 | 確定性（食物=舒適）、多樣性（味道刺激）、連結感（家庭記憶） | 運動、創作；人際活動 |
| 工作狂 | 重要感、確定性、成長 | 建立工作以外的重要感來源；面對被逃避的問題 |
| 拖延症 | 確定性（不做就不會失敗）、多樣性（做其他更有趣的事） | 把任務拆小；找到使命感 |

---

| 焦點 = 感受 | 改變焦點，情緒立刻改變 |
| 意義 = 情緒 | Viktor Frankl：選擇意義的自由，沒有人可以搶走 |
| 需求陰暗面 | 每個需求都有破壞性的滿足方式；大腦不在乎好壞 |

**來源**：0313-2.en.srt，約 01:20–01:40
**核心概念**：三大焦點模式深化、9/11 夏威夷故事、Tony 童年感恩節故事、貢獻的雙向恩典

## 一、三大焦點模式

**焦點一：擁有的 vs 缺少的**
> 「如果你把所有時間都聚焦在你沒有的東西上，你就創造了永無止境的貧乏感——即使你客觀上已經非常富有。」

先承認你的豐盛，再去解決問題。這兩件事不矛盾——可以同時感恩現在擁有的，又全力以赴去爭取更多。

**焦點二：能控制的 vs 不能控制的**
大多數人把巨量心理能量花在無法控制的事上（別人的評價、過去的事、未來的不確定性）。

> 「那些精力全部白費了。你在一個沒有報酬的地方投資你最珍貴的資源——你的注意力。把它移回你可以控制的事情上：你的選擇、你的反應、你的行動。」

**焦點三：過去 vs 現在/未來**
> 「過去是信息，不是你的牢籠。你可以從過去學習，但你必須在當下生活，往未來前進。過去已經發生了——那個故事結束了。你現在要寫的，是接下來的章節。」

---

## 二、9/11 夏威夷故事——情緒之家在極壓下的顯現

2001 年 9 月 11 日早上，Tony 正在夏威夷帶領一個數百人的大型研討會。就在活動進行中，工作人員帶來消息：紐約世貿大樓被飛機撞擊，正在燃燒，第二架飛機也撞了。現場立刻陷入混亂，數百人哭泣、互相擁抱。Tony 必須當場決定怎麼應對。

**第一個人：憤怒的女士**

人群中，有一位女士在哭泣的同時，大聲說：「這都是美國政府的錯！我們活該！這一切都是我們自己造成的！我們在全世界做了那麼多壞事，所以這是報應！」

Tony 說：「我看著她，我看到的不是壞人。我看到的是一個在最高壓的時刻，回到了她的情緒之家的人。**她的情緒之家是憤怒和責備。** 憤怒讓她感覺有力量，讓她感覺有個東西可以對抗、可以掌控。在這個最需要連結和愛的時刻，她自動走回了她最熟悉的那個情緒的房間。」

**第二個人：愧疚的護士**

角落裡有一位護士，蹲在地上哭泣，不停喃喃自語：「是我的錯，是我的錯。我今年沒有去投票……我沒有盡到公民責任……這是我的報應……」

「**她的情緒之家是愧疚。** 當悲劇發生，她自動把所有責任攬到自己身上——即使她沒去投票跟 9/11 完全沒有關係。但愧疚讓她感覺她能做點什麼、她有責任、她的存在是有意義的。這是她熟悉的方式。」

> **「同一個事件。同一個時刻。外在的壓力不改變你的模式。它只是讓你的模式更加清晰可見。你平時如何反應，是你練習的總和。如果你想在危機中表現不同，你必須在平時就改變你的情緒之家。」**

---

## 三、Tony 的感恩節故事——17 歲時，陌生人改變了一切

Tony 說，他的童年非常不容易——家境貧困，父母的關係充滿衝突，家裡的氛圍是緊張和不穩定的。他從小活在一種感覺裡：這個世界是不安全的，沒有人真正在乎你，你只能靠自己。

那年感恩節，Tony 大約十七歲。家裡根本沒有錢買食物。母親在崩潰邊緣，哭泣、憤怒、對著空的冰箱發呆。外面是感恩節的氣味，鄰居家裡傳來烹飪的香味。Tony 說：「我感覺到一種巨大的羞恥感——不只是餓，是『我們是被這個世界遺忘的人』的那種感覺。」

就在這個時候，有人敲門。Tony 去開門。門外站著一個年輕男人，他不認識，手裡捧著一個很大的袋子——裡面裝滿了食物：一隻整火雞、馬鈴薯、蔬菜、麵包、甜點。

那個年輕人把袋子遞過來，說：「**我家有多的，想和你們分享。節日快樂。**」然後轉身就走了。

Tony 說：「那個時刻，我哭了。不是因為終於有食物了。**是因為我突然明白了一件事：有陌生人在乎我們。**」在那個時刻之前，他對這個世界的信念是：你是孤獨的，人們不在乎彼此，這個世界是冷漠和競爭的。

那個陌生人創造了一個完全不同的意義：「世界上有人關心我，即使他根本不認識我。這個世界不只是冷漠和自私的。」這個意義的轉變，比食物本身重要一千倍。

---

## 四、17 歲——Tony 去敲了另一個人的門

那個感恩節之後，Tony 想：「我要把這個傳下去。」

他 17 歲，幾乎沒有錢。但他拿了他僅有的一些錢，走進超市，買了他能買到的最豐盛的感恩節食材：一隻火雞、馬鈴薯、蔬菜、麵包。然後走到一個他認識的西班牙裔家庭的公寓門口。

他站在門外，有點緊張，不知道該說什麼。一個小女孩開了門。父親走出來，看著這個站在門口、手捧食物的陌生少年，不知所措。Tony 有點手足無措，最後說了一句有點好笑的話：「**我媽媽讓我帶來的。希望你們節日快樂。**」（他的媽媽完全不知道這件事。）

那個父親的眼睛充滿了淚水。他站在那裡，沉默了幾秒，然後說謝謝，上前把 Tony 緊緊抱住。

Tony 說：「**我從來沒有見過一個成年男人當著自己孩子的面哭泣。** 那個男人的眼淚，那個擁抱——我感受到的，是一種我從來沒有體驗過的東西。我不是在給那個家庭食物。我是在給他們一個意義——**有人看見你，有人在乎你。** 而他給了我一個意義——我的一個小小的行動可以讓一個成年男人感動到落淚。」

> **「給予不只是對方的需求被滿足。給予的那個人，他自己的靈性需求也同時被滿足。這是一個雙向的恩典。你在給予的那一刻，你也在接受——接受的是意義、是連結、是證明你的存在有價值的感覺。」**

這個 17 歲的經歷，是他後來發起「**10 億餐計畫（1 Billion Meals Challenge）**」的根源——至今已為全球最貧困的人提供超過 10 億份餐食。

**來源**：0313-2.en.srt，約 01:40–02:00
**核心概念**：資源 vs 資源能力、Al Gore 故事、Walmart vs Kmart、Zappos 三步驟公式

## 一、最重要的區別：資源 vs 資源能力

> **「資源（Resources）從來都不是真正的問題。問題永遠是缺乏資源能力（Resourcefulness）。」**

**資源**（Resources）= 你手邊已有的：錢、時間、人脈、技術、知識

**資源能力**（Resourcefulness）= 在沒有足夠資源的情況下，找到方法達成目標的能力

大多數人的思維：「我需要先有資源，才能開始。」
有資源能力的人的思維：「我怎麼用現有的東西，往前走一步？」

> 「資源能力是人類情緒狀態的產物。當你充滿熱情、創造力、決心和愛，你就能找到任何問題的解決方案。這不是技術——這是狀態管理。」

---

## 二、Al Gore——失去一切後創造更大影響力

2000 年美國總統大選，Al Gore 在佛羅里達州計票爭議中以極微差距敗選。他失去了政治平台、副總統辦公室的媒體資源、政府人脈網絡。很多人認為他的影響力時代已經結束了。

但 Gore 沒有消失。他拿著一台筆記型電腦，走遍全美，在學校、企業、小型會議上，做一場關於氣候變遷的簡報——他做了這場簡報超過 **1,000 次**。

Tony 說：「他從最有權力的政治職位落敗，然後開始在任何願意讓他說話的地方說話。他有的就是：對一個重要議題的深切信念、一台筆記型電腦、一組投影片，以及願意去任何地方重複這個訊息的堅持。」

2006 年，Al Gore 受邀在 TED 大會做演講。電影製作人 Davis Guggenheim 在現場看到後，決定把它拍成紀錄片。《難以忽視的真相》全球上映，席捲各地討論。2006 年獲奧斯卡最佳紀錄片獎；2007 年獲諾貝爾和平獎。

> 「Al Gore 的故事告訴我們：當你沒有資源，但你有足夠的信念和資源能力，你可以創造比有資源時更大的影響力。他是在政治資源最少的時候，做出了最大的貢獻。」

---

## 三、Walmart vs. Kmart——相同行業，資源能力決定命運

| | Walmart | Kmart |
|--|---------|-------|
| 創立時間 | 1962 年 | 1962 年（同年！） |
| 初期資源 | 比 Kmart 少 | 比 Walmart 多 |
| 1990 年代末結果 | 全球最大零售商 | 多次申請破產保護 |

**Sam Walton 的資源能力**：
- 深入美國中部小鎮，研究被大城市零售商完全忽視的消費者——親自走訪每家小型雜貨店，問問題，記筆記
- 比競爭對手提早十年採用電腦化庫存追蹤，大幅降低成本回饋消費者
- 「Walmart 員工法則」：每個員工在距離客戶十步內必須主動打招呼——不是政策，是文化

Kmart 有更多資源，但陷入官僚化，無法快速回應市場變化，停滯在「我們已經夠大了」的自滿。

> 「Kmart 輸掉的不是資源之戰，而是資源能力之戰。在你有資源之前，你需要資源能力。在你有資源之後，你也需要資源能力——因為資源會讓你自滿，而自滿是成功的敵人。」

---

## 四、Zappos——理想客戶的完整三步驟公式

Tony Hsieh（謝家華）接手了一家陷入困境的網路鞋子公司 Zappos。所有人都說：「在網路上賣鞋子不可能成功。鞋子不試穿怎麼買？」

**Step 1：找到理想客戶**

深入分析後，答案很清楚：女性。女性購鞋量遠超男性，而且鞋子對很多女性不只是功能品——一雙鞋可以改變她感覺自己是誰的方式，是身份認同的一部分。Tony 在現場問全場女性：「有多少人因為愛一雙鞋，而買了不合腳的鞋，把它放在家裡，等著有一天能穿上它？」全場大量女性舉手，笑聲四起。

**Step 2：創造不可抗拒的提案**

對於害怕買到不合腳的人，Zappos 把試穿的風險降到零：可以一次訂購 **20 雙鞋**，全部免費送到家裡；不喜歡任何一雙可以退貨，退貨運費完全免費，全額退款，沒有任何問題。

投資人說：「你要破產了。讓人隨便訂 20 雙、退貨還免運——你的成本怎麼算？」Tony Hsieh 的回答：「你已經在走向破產了，為什麼不試試看這個不可抗拒的提案？」

他知道投資人不理解的事：女性對鞋的熱愛讓退貨率低得出乎意料——她們會訂 20 雙，最後留下 17 雙，因為每雙她都愛，說服自己每雙都需要。

**Step 3：超額交付**

- 找不到你要的款式，客服幫你找到有貨的競爭對手
- 標準出貨 3-5 天，偶爾偷偷升級到隔夜快遞，讓你驚喜提早收到
- 包裹裡有時附上驚喜小禮物和手寫感謝卡
- 客服沒有通話時間限制——有一通電話長達 **11 小時**

客戶不只是滿意，他們成為狂熱粉絲，主動告訴所有朋友。

**2009 年，Amazon 以 12 億美元收購 Zappos。**

Tony Hsieh 完全可以拿錢離開，但他繼續擔任 CEO。Tony 說：「他不是為了錢而建立 Zappos。他想要建立一個讓人快樂的公司——讓員工快樂，讓客戶快樂。錢只是副產品，不是目的。」Tony Hsieh 2020 年去世，享年 46 歲。

---

## 五、三案例共同主題：情緒是資源能力的根源

Al Gore 靠的是對氣候議題的信念和熱情；Sam Walton 靠的是對顧客的好奇心和謙遜；Tony Hsieh 靠的是對「讓人快樂」的使命感。

> 「絕望的人看不到可能性，充滿信念的人在最困難的地方也能找到出路。狀態不只是讓你感覺好，狀態決定你能看到什麼、能找到什麼。」

**來源**：0313-2.en.srt，約 02:00–02:20
**核心概念**：Subaru 發現被忽視的理想客戶、Domino's 30 分鐘保證誕生故事、生命是慾望與恐懼之舞

---

## 一、Subaru 的故事——找到被完全忽視的理想客戶

1990 年代初，Subaru 面對 GM、Ford、Toyota 等巨頭，沒有規模優勢，財務接近破產邊緣。他們請來市場研究專家，任務是：找到理想客戶。

這位專家花了三個月研究現有客戶中誰最忠誠：誰最常買 Subaru（不只一輛，是一再回來買的人）？誰最常推薦給朋友？誰的品牌忠誠度最高？

**答案讓所有人跌破眼鏡：Subaru 最理想的客戶，是 18 到 35 歲的女同志（Lesbian Women）。** 這個群體購買 Subaru 的比例，是任何其他人口群體的**四倍以上**。

原因：Subaru 的全輪驅動（AWD）非常適合她們喜愛的戶外活動；Subaru 的實用、不浮誇的設計符合她們的價值觀；而最根本的原因是——**沒有人在為她們服務。** 這是一個有強烈購買力、高品牌忠誠度，卻完全被整個汽車行業忽視的市場空白。

**但要理解這個決定有多大膽，必須理解時代背景：1990 年代初的美國，公開的同性戀身份在社會上還不被廣泛接受。** 沒有任何主流品牌以女同志為目標市場。公開針對這個群體做廣告，意味著冒著失去保守消費者的風險。

Subaru 的管理層決定：跟著數據走。他們創作了專門針對這個群體的廣告系列，畫面是兩位女性一起駕駛 Subaru，場景是山野和戶外，語言傳遞了「這個品牌看見你、尊重你」的訊息。

> 「那個群體愛死了這些廣告。她們感覺終於有一個品牌看見她們、在乎她們。Subaru 的銷量爆炸性成長。今天，Subaru 是美國最賺錢的汽車品牌之一。」

> 「三個月的深度研究，讓 Subaru 找到了一個沒有人在服務的群體，並讓那個群體把整個公司從瀕臨破產帶到成功。你願意花多少時間去真正了解你的理想客戶？」

---

## 二、Domino's Pizza——30 分鐘保證的誕生

**Tom Monahan 的起點**

Tom Monahan 借來一些錢，買下了密西根州一家快要倒閉的小比薩店「DomiNick's」。他有一個別人沒有的習慣：觀察。

他花了幾個月仔細觀察客戶和競爭對手，得出三個洞察：
1. 店面空間是最大的成本——外送模式可以用小得多的空間大幅降低成本
2. 外送為主意味著可以用更少的錢開更多門市，快速複製
3. 大學生是最理想的客戶——宿舍沒廚房、深夜還清醒、永遠在餓肚子

他把第一家 Domino's 開在密西根州立大學附近，幾乎沒有堂食座位，專注一件事：**快速外送給大學生。** 成長迅速，開始擴張。

**成長帶來的危機**

隨著門市擴張，外送距離變長，比薩開始遲到。Pizza Hut 嗅到機會，代表找到 Tom Monahan：「你已經快破產了。把公司賣給我們，體面地結束。」Tom Monahan 拒絕了：「這是我的心血，我不賣。」但他確實快頂不住了。

**那一通改變一切的電話**

就在最絕望的時刻，Tom Monahan 親自接起了一通客訴電話。

電話那頭，一個憤怒的男人說：「**你們的比薩等了一小時十五分鐘還沒到！你知道嗎，我不想要你的比薩了，就算到了我也不付錢！你們的服務爛透了！**」

Tom Monahan 沒有爭辯，沒有解釋。他說：

「**先生，我非常抱歉。我現在就幫您重新做一個新的比薩。如果 30 分鐘內還沒送到您家，這個比薩完全免費——一分錢不收。**」

電話那頭沉默了一秒，然後說：「好，你說話算話。」

那個比薩在 **28 分鐘**內送到了。顧客打電話回來說：「這是我吃過最好吃的比薩！」（比薩本身沒有改變——改變的是整個體驗帶來的情緒。）

Tom Monahan 立刻意識到：他剛才說的那句話，比任何商業策略都更有力量。他把那個意外的承諾，變成了全公司的保證：**「30 分鐘內送達，否則免費。」**

這個保證的天才之處：大學生不在乎比薩是不是最好吃的，他們在乎的是「我現在餓了，快點來」。「30 分鐘保證，否則免費」消除了等待的焦慮，創造了清晰的承諾——Domino's 自己也知道比薩不是最好吃的，但他們是**最快到達、有保證的比薩。**

> 「Domino's 從一家快要倒閉的小店，成長為全球最大的比薩連鎖品牌之一。靠的不是最好的比薩，而是知道理想客戶需要什麼，並創造了無法拒絕的保證。」

## 三、生命是慾望與恐懼之舞

> **「生命是慾望和恐懼之舞。你最渴望的是什麼，你最恐懼的是什麼——這兩件事之間的張力，就是你生命的邊界。」**
> *Life is the dance between what you desire most and what you fear most.*

**應用在商業**：了解你的客戶最渴望什麼（你能提供什麼）+ 最恐懼什麼（你能消除什麼）= 真正的商業機會

| 公司 | 客戶最渴望的 | 客戶最恐懼的 | 不可抗拒的提案 |
|------|---------|---------|-------------|
| Zappos | 找到完美的鞋 | 買錯、不合腳 | 20 雙零風險退貨 |
| Subaru | 被看見、被尊重 | 沒有品牌在乎我 | 專門針對她們的廣告 |
| Domino's | 快點吃到食物 | 等太久、浪費錢 | 30 分鐘否則免費 |

**應用在個人生命**：如果你想讓生命更豐富，有兩條路：
1. 讓你的渴望變得更大——擴大夢想，讓在乎的東西更有力量地拉著你往前走
2. 讓你的恐懼變得更小——挑戰、穿越讓你停在原地的恐懼

> 「你的生命有多大，不是由你的天賦決定的，不是由你的環境決定的，而是由你願意承受多大的恐懼、追求多大的渴望來決定的。」

## 一、Day 1 的核心命題

> **「你來這裡不是為了錢、不是為了關係、不是為了健康。你來這裡是因為你想要更高品質的生命。而生命的品質，等於你情緒的品質。」**
> *The quality of your life is the quality of your emotions.*

你所有的外在成就——事業、財富、關係、健康——最終都只是工具，目的是讓你有某種**感受**。如果你直接學會創造這些感受，你不需要等到外在條件改變。

| Day 1 主題 | 如何影響情緒品質 |
|-----------|----------------|
| 身體狀態 | 動作改變情緒——身體不只反映狀態，它**創造**狀態 |
| 六大需求 | 習慣性情緒模式反映哪個需求正在被滿足（或剝奪） |
| 焦點決定感受 | 情緒品質完全取決於你把注意力放在哪裡 |
| 信念系統 | 信念過濾感知，創造你的情緒現實 |
| 語言 | 詞彙直接改變神經化學和情緒狀態 |
| 情緒之家 | 習慣性情緒就是你生命的日常品質 |

## 二、四個書寫問題（12 分鐘）

> 「**不要只是想，要寫下來。** 書寫強迫你把模糊的感覺轉化為具體文字，把想法精確化。」

書寫時大腦的語言皮層、運動皮層和前額葉皮層同時激活，創造比純粹思考更強烈的神經編碼。

**問題一：未來 6-12 個月「下一個層次的非凡生活」是什麼？**

「我不問你的終極目標，因為它太遙遠，很難有真實的情感連結。我問你的是：再走一步，你在哪裡？」
- 身體/精力：你早上醒來的感覺是什麼？
- 主要關係：你和最重要的人的關係有什麼不同？
- 事業/財務：你做的工作是什麼？你創造了什麼影響？
- 情緒品質：你最常有的情緒是什麼？（取代現在最常有的）
- **要具體**：不是「更健康」，而是「每天早上六點起床，花 30 分鐘鍛煉，不需要咖啡因就能全天運作」

**問題二：是什麼阻止你現在就做到這些？**

| 阻礙類型 | 具體例子 |
|---------|---------|
| 限制性信念 | 「我不夠聰明/年輕/有背景」「像我這樣的人做不到」 |
| 習慣性反應 | 一有壓力就拖延、逃避 |
| 情緒模式 | 每次有進展就開始自我破壞 |
| 身份認同衝突 | 「達到那個目標的人不像我這種人」 |

> 「把這個阻礙**寫下來**，你就從它的受害者，變成了它的研究者。你不再是它，你在研究它。那個距離，就是你開始改變的空間。」
> *Crisis creates breakthroughs. Disappointment either destroys you or drives you — you must decide which.*

**問題三：今天可以採取什麼行動？**

你需要打什麼電話？報名什麼課程？需要開始什麼習慣？今天第一個行動是什麼？需要停止什麼？

> 「不要等到你完全準備好了。被打倒了不是你的錯。但如果你不站起來，那就是你的責任了。」
> *It's not your fault to get knocked to your knees. But it is your fault if you don't get off your knees.*

**問題四（加分）：最常有的兩個壓力性思維是什麼？**

定義：每週多次甚至每天都出現、讓你感到壓力或痛苦的習慣性思維。

全場學員分享的真實答案：
- 「我在親子關係上做得夠好嗎？」
- 「如果我嘗試了但失敗了，別人會怎麼看我？」
- 「我值得被愛嗎？」
- 「時間不夠用了。」

Tony 說：「你們的誠實讓我感動。這些答案是真實的人類內心。你們不孤單——這些思維是人類共同的模式。」

**四步驟轉化壓力性思維**：
1. 寫下這個思維（越具體越好）
2. 寫下什麼情況觸發它
3. 觀察你通常怎麼反應
4. 寫下一個你真的可以相信的更有力量的替代思維

替代思維例子：
- 「生命正在為我發生，而不是對我發生。」（Life is happening FOR me, not TO me.）
- 「我不需要現在就知道所有答案。每一步會帶來下一步。」
- 「上帝的延遲，不是上帝的拒絕。」（God's delay is not God's denial.）

## 三、分組討論

書寫完成後，把你的答案說給真實的人聽——3-4 人小組分享問題一到三的答案。

> 「當你把它說出來，當著活生生的人說——它就從一個模糊的想法，變成了一個真實的承諾。社會壓力是最強大的改變催化劑之一。」

**來源**：0313-3.en.srt，約 00:33–00:48
**核心概念**：臨在的精確定義、自我評估是恐懼的開關、所有痛苦根源是自我

---

## 一、台上輔導：Tim 和 Giuliana

在 Day 1 晚間，Tony 邀請了一對夫妻上台。Tim 是成功的商人，他說：「我把她帶來，因為我不知道怎麼讓她感受到愛。我很努力，但不管我做什麼，她都說她感受不到。」Giuliana 在旁邊輕輕點頭，眼眶微紅。

Tony 引導 Tim 說出他的感受。Tim 直視著 Giuliana，用真誠的聲音說：「I love you.」

Tony 點頭：「好，這是真誠的。但你知道問題在哪裡嗎？**你說得太快了。**」

> **「她要的是你多待一下（linger）。你沒有辦法多待，因為你一直在趕去解決你的恐懼。你說了『我愛你』，然後下一秒你的頭腦已經在想：她有沒有感受到？我表現好了嗎？她開心了嗎？——你人已經走了。」**

---

## 二、眼神的練習——什麼都不說

Tony 讓兩人走到舞台前方，正對著彼此站好。然後他拿走了 Tim 手上的麥克風，說：

「**不要說任何話。** 只是看著她的眼睛。然後在你的心裡，默默地重複這三句話：

*I love you. I own you. I will take care of you forever.*（我愛你。你是我的。我永遠都會照顧你。）

不要說出來。只是讓它在你心裡。然後看著她。」

Tim 站在那裡，沉默地看著 Giuliana。起初身體有點僵——「什麼都不做只是看著對方」的靜止，對一個習慣行動和解決問題的商人來說，是反直覺的。

幾秒過去了。慢慢地，Giuliana 的表情改變了。她的眼睛開始泛紅。一滴眼淚沿著臉頰滑落。全場鴉雀無聲。

Tony 輕聲問 Giuliana：「他說了什麼讓妳感動？」

Giuliana 搖搖頭，用微顫的聲音說：

「**他一個字都沒說。我看見他的眼睛……就感受到了愛。**」

全場掌聲轟然響起。

Tony 說：「你什麼都沒改變，只是進入了一個愛的狀態。你的焦點不在自己身上——不在『我有沒有表現好』——而是完全在她身上。當你的焦點在她身上，你就到達了那裡。當你的焦點在自己身上，你就已經離開了。」

---

## 三、自我評估是恐懼的開關

> **「只要你在評估自己，恐懼就永遠不會消失。」**

Tim 在愛的時刻同時在想：「她喜歡我嗎？我有沒有表現好？我夠不夠好？」——這些都是自我評估的問題，把注意力從「她」拉回到「我」。只要注意力回到「我」，連結就斷了，恐懼就進來了。

有人問 Tony：「你怎麼能連講七天的課，你不會害怕嗎？」

> 「因為我沒有在想自己。我的焦點在你們身上，在服務上。當你聚焦在自己、擔心自己表現好不好，你的表現一定差。當你的焦點完全在服務——在對方、在你想要貢獻的東西上——恐懼消失了，因為你不在那裡了。」

**核心機制**：
- 焦點在自我 → 自我評估 → 恐懼和焦慮 → 斷開連結
- 焦點在對方/服務 → 臨在 → 連結 → 愛和能量

---

## 四、所有痛苦的根源是自我

> **「All suffering is about the self.（所有的痛苦，都跟自我有關。）」**

有人挑戰：「我現在在為我的孩子擔心，這也是自我嗎？我在為別人痛苦！」

Tony 說：「你說的是真的——你在乎你的孩子。但讓你**痛苦**的不是孩子。讓你痛苦的是你對自己的判斷：『我讓孩子失敗了。我是一個不夠好的父母。』

如果你沒有那個自我評估和自責，你不會痛苦——你只會去思考：我能怎麼幫他？我能做什麼？那是行動，不是痛苦。

**痛苦來自『我』這個評估者。** 去掉評估者，問題還在，但痛苦消失了，行動出現了。」

---

## 五、臨在的精確定義

> **「臨在 = 平靜（calm）+ 連結（connected）。**
>
> 不是聚焦在她，不是表演給她看，不是努力讓她感受到你的愛。而是：**沉下來**，然後**真的在她那裡**。平靜地在場。」

Tim 的慣性模式是「商人模式」——多工、快速、立刻解決問題。這個模式在生意上極有效，但帶著這個模式跟 Giuliana 說話，她感受到的是速度感和效率感。速度感傳遞的是**焦慮**。女人需要感受到**安全感**才能打開心門，安全感來自平靜，不是速度。

Tim 和 Giuliana 的問題不是不愛彼此，而是兩個人都在趕著往未來跑：Tim 追事業的安全感（「等我財務安全了，我就能真正在這裡」），Giuliana 追育兒的掌控感（「等孩子穩定了，我就能真正在這裡」）。住在同一個屋子裡，卻都不在當下。

---

## 六、「我的歌」vs「我們的歌」

> **「如果你這一週想要帶走一個全新的人生，你必須學一首新歌——那首歌叫『我們』（we）。因為人生不是關於我，而是關於我們。」**

任何一種獨自的快樂，都比不上你把那個快樂跟另一個人分享時的感受。當你有令你興奮的事發生，第一個想做的是分享——這就是人類存在的真相：連結比成就更深刻，「我們」比「我」更完整。

Tony 結束時說：

> 「我剛才沒有創造出什麼新的東西。那是真實的你。你只是忘了這個你，因為你讓另一個習慣成了你——那個趕時間、想取悅人的你。當你聚焦在你所愛的，而不是你所恐懼的；聚焦在此刻已有的美好，而不是未來某一天才能得到的滿足——你就充滿了力量。」

Tim 點頭，眼眶也紅了。Giuliana 看著他，臉上帶著眼淚和微笑。全場起立鼓掌。

---

## 一、卓越人生的兩大核心技能

> **「如果你想要一個卓越的人生，有兩大核心技能。只要你掌握這兩樣，人生就會卓越：**
> **第一大技能：成就的科學（The Science of Achievement）**
> **第二大技能：幸福的藝術（The Art of Fulfillment）**」

**為什麼叫「科學」？**

> 「我叫它科學，因為它有非常清楚的規則。任何人，不管你的性別、背景、你在哪個國家出生——只要你遵守這些規則，你就會得到結果。大多數人不是因為不努力而失敗，而是因為他們不了解遊戲的規則。」

---

## 二、Step 1：痴迷式聚焦（Obsessive Focus）

Tony 請大家回想一個曾經的夢想——覺得幾乎不可能但今天已實現的事。「當初，你做的第一件事是什麼？」

全場各種答案：「下了決定」、「開始行動」、「相信它」……

Tony 說：「所有這些都是真的，但在這些之前，有一件事先發生了。」

> **「你變得痴迷（obsessed）。你開始不停地想它——在開車的時候想，在洗澡的時候想，在睡覺前想。你的腦子停不下來。**
>
> **這就是第一步。不是計劃，不是策略，是痴迷。**」

> **「焦點在哪裡，能量就在哪裡。」**（Wherever focus goes, energy flows.）

**RAS 機制**：大腦裡的「網狀活化系統」負責決定你注意到什麼、忽略什麼。你的感官每秒接收約 200 萬個訊號，但意識只能處理約 7 個——RAS 做過濾。

「你買了一台白色 Honda CR-V。買了之後，突然發現路上到處都是白色 CR-V！那些車之前就在那裡，只是你的大腦之前把它們全部刪掉了。當你買了那台車，大腦重新設定：這個對我重要——RAS 開始讓它進入你的意識。」

當你對某個目標變得痴迷，你在對 RAS 說「這件事對我非常重要，請注意它」：

> 「你坐在咖啡廳，旁邊四桌以外有人在談房地產投資——你會聽見，你會靠過去。很多人以為成功的人『很幸運』，一直遇到對的機會。不是幸運——是他們的 RAS 讓他們注意到了普通人視而不見的訊號。」

---

## 三、Step 2：大量行動 + 有效執行

**嬰兒學走路的哲學**

大多數人不行動的原因是等待「確定感」——想等到完全確定自己會成功，才願意開始。

「想想嬰兒學走路。一個嬰兒平均要跌倒多少次，才能學會走路？**超過一千次。**

你有沒有見過任何父母，走向自己的寶寶，說：『好了，你走了一百次都跌倒，你顯然就不是走路的料，乾脆放棄吧，爬就夠了』？

不可能。你的態度是——**他會繼續嘗試，直到他走起來。** 這就是為什麼幾乎每一個人類都會走路——**因為嬰兒不評估自己，不自我懷疑，只是繼續嘗試。**」

> **「但是，當有人說你唱歌難聽，你相信了——你就停了。然後你真的再也沒有歌聲了。不是因為你真的唱不好，而是因為你相信了一個讓你停下來的故事。嬰兒跌倒一千次，你被說了一句話就停了。這就是成人學習最大的問題。」**

成功公式：嘗試→失敗→學習→調整→再嘗試。每次失敗，問的不是「為什麼我這麼差」，而是：「什麼方法有效？什麼方法沒效？我要改什麼？」

> 「成功的人，不是因為他們比別人更聰明或更有才華。他們是在不確定中就開始嘗試，試了不行就改，一直改，直到找到有效的方法，然後全力執行。」

---

## 四、加速器：模仿頂尖者（Modeling）

> **「找到一個已經達到你想要結果的人，研究他們做了什麼、怎麼想，然後複製那個模式。這是最快的學習方法，因為他們已經替你試過所有的錯誤了。**
>
> **成功留下線索（Success leaves clues）。」**（來自 Jim Rohn）

Tony 寫《Money: Master the Game》（金錢：精通遊戲）的方法：用四年時間親自採訪 50 位全球最頂尖財務投資人（包括 Ray Dalio、Warren Buffett、Paul Tudor Jones），找到他們不同策略之下共同遵守的基本原則，提煉出來教給所有人。

> 「你可能一個月、一週內就學到他們花了十年試錯才找到的答案。這就是 Modeling 的威力——它讓你的時間倍增。」

**來源**：0313-3.en.srt，約 01:04–01:20
**核心概念**：幸福的藝術 vs 成就的科學、金錢是放大器、成長與給予是幸福的兩大模式、羅賓·威廉斯的故事

## 一、第二大核心技能

> **「有時候，人們達成了一切，卻還是不快樂。如果你只能學兩大技能的其中一個——學這個。**
>
> **幸福的藝術（The Art of Fulfillment）**」

**為什麼是「藝術」，不是「科學」？**

成就的科學有普世規則——任何人遵守規則都能得到結果。幸福的藝術沒有固定答案——每個人的幸福源泉都不一樣。

> 「如果你把一生花在追求別人說你應該要的東西，最後你到達了那裡，然後你問：『就這樣？』——那才是真正的悲劇。」

---

## 二、金錢只是放大器

Tony 採訪了 50 位白手起家的億萬富翁。問全場：50 個人裡面，有多少真正快樂？

答案：**大約五個。**

有人說：「看吧！錢讓人不快樂！」Tony 立刻糾正：

> **「不，不，不。記下來：錢只是放大器。（Money just magnifies who you are.）**
>
> 你本來吝嗇，有錢之後更吝嗇——因為現在吝嗇的能力更大了。你本來慷慨，有錢之後給更多。錢不會改變人，它只是讓你原本的樣子更大、更明顯。」

他的一個億萬富翁朋友，身家數十億，卻和妻子、女兒為了 $2,700 和 $3,500 的珠寶激烈爭吵——這個數字對他來說是身家的零頭的零頭。他從小在匱乏中長大，那個心理從來沒有改變，錢只是放大了那個問題。

---

## 三、幸福的兩個共通模式

### 模式一：成長（Growth）

想一個人生中非常艱難的處境——幾乎不可能撐過去，但你逼著自己繼續，最後做到了。那一刻的感受是什麼？滿足、驕傲、充實、「真的活著的感覺」。

> 「那種感受，幾乎無可取代。不是因為你達到了某個外在的標誌——而是因為你超越了你以為的自己的極限。你知道了你比你以為的更有能力。」

成長不一定要是戲劇性的突破——可以是學了新技能、完成困難的對話、堅持新習慣。關鍵是：你昨天做不到，今天做到了。

### 模式二：給予（Give）

> 「當你成長，你有東西可以給出去。生命不是關於我，而是關於我們。你獨自能感受到的快樂，遠不及你把那份成長、那個洞見、那個愛分享出去時的感受。**成長 + 給予，才是幸福的核心。**」

---

## 四、羅賓·威廉斯的故事——達成一切，卻失去了一切

Tony 說：「我要告訴你一個故事，用來說明『成就一切卻仍不快樂』最極端的結局。」

羅賓·威廉斯（Robin Williams）來到好萊塢時，有一張夢想清單：

「我要有一個自己的節目。」→ 他的 Mork & Mindy 在美國排名第一

「我要讓節目不只在美國，還要在至少十個國家排名第一。」→ 他在 **18 個國家**都做到了

「我要賺夠多的錢，讓我和家人財務完全自由。」→ 他做到了

「我要有一個充滿愛的幸福家庭。」→ 他做到了

「我要放棄電視，去拍電影。」→ 他做到了，而且成為影史最成功的喜劇演員之一

「我不只要拍喜劇。我要拿一個非喜劇類的奧斯卡獎——讓所有人看見我不只是個搞笑的人。」→ 他憑《心靈捕手》（Good Will Hunting）贏得了奧斯卡最佳男配角獎。

**他做到了所有事情。每一個夢想。**

然後——2014 年，他在自己家裡上吊。留給家人發現他掛在繩子上的遺體。

> **「他讓全世界的人笑了。但他讓誰快樂了？除了他自己，誰都快樂了。**
>
> 他感受到一種必須永遠表演、永遠讓所有人開心的壓力——即使是在他自己最痛苦的時候。他學會了讓所有人快樂的科學，但他沒有學會讓自己快樂的藝術。」

> **「成功，沒有幸福，是終極的失敗。（Success without fulfillment is the ultimate failure.）」**

Jim Rohn 的話：「你得到的東西，永遠不會讓你快樂，Tony。讓你快樂或悲傷的，是你在追求這個目標的過程中，成為了什麼樣的人。」

---

## 五、Steve Wynn 與那幅 8,700 萬美元的紅色方塊

Tony 的朋友、拉斯維加斯建築大亨 Steve Wynn（永利集團創始人）打電話給 Tony，聲音裡充滿興奮：「Tony！你一定要來看我剛買到的東西。我等了這幅畫 15 年。我剛在蘇富比買下來了。你必須親眼看！」

Tony 問：「多少錢？」Steve：「**8,700 萬美元。**」

Tony 開車前往，在心裡想像：8,700 萬美元的畫作，一定是米開朗基羅的傑作，天使從雲端破出……

他走進客廳，看見了那幅畫。沉默。然後說：「**就這樣？**」

「對，就這樣！驚不驚人？」

「Steve，我不想破壞你的好心情，但……這是一個紅色方塊。而且裡面還有幾個地方是缺的。」

「這是 Rothko！（馬克·羅斯科，表現主義大師）」

「我知道是 Rothko，但如果你給我 $200 的紅色顏料，20 分鐘之內，我覺得我可以複製這玩意兒。」

Steve 開始解釋 Rothko 的生平……

「8,700 萬美元，那畫裡面應該有他的血！」（全場爆笑）

但說真的——Tony 說：「Steve 看著那幅畫，感受到的是狂喜。他能看出每一筆觸背後的意義，感受到 Rothko 一生掙扎的重量——而我只看到紅色方塊。」

> **「誰更有品味？顯然是他。因為他能從那個方塊裡，提取出 8,700 萬美元的快樂。我在同樣的東西上，只能感受到零。**
>
> 幸福沒有標準答案。你必須找到什麼能真正填滿你——然後追那個，而不是追別人說你應該要的東西。」

**核心概念**：改變人生的一個字「決定」、三類重要決定、瓦拉納西印度故事、妻子 Sage 動暈症開場

---

## 一、不只有羅賓·威廉斯

安東尼·波登（Anthony Bourdain）走遍 100 多個國家，把全世界飲食文化帶到億萬觀眾客廳，2018 年在法國拍攝節目期間，在飯店房間裡結束了自己的生命。

凱特·絲蓓（Kate Spade）擁有超過 175 家全球門市，品牌年營收超過 20 億美元，2018 年在紐約公寓裡離開了這個世界。

> 「這些人，在文化標準上是成功的頂點。但在內在標準上——他們失敗了。你不必二選一。你可以兩樣都有——成就，也要幸福。但你必須有意識地去學。」

---

## 二、改變人生的核心——只有一個字

「我走遍了世界 195 個國家，服務過各種背景的人。如果你問我，改變一個人生命的核心是什麼——我可以用一個字告訴你。」

> **「決定（Decisions）。唯一能長期改變你人生的，是一個真正的決定。」**

「Decision（決定）」來自拉丁文「incision（切割）」——切斷。

> 「當你做了一個真正的決定，你切斷了其他所有的可能性，只剩下你所承諾的那件事。真正的決定意味著：你立刻採取大量行動，然後持續行動，直到做到為止。沒有退路，沒有 Plan B，沒有『如果失敗了就算了』。你燒掉了船，因為你沒有計畫回去。」

**「我想要」vs「我決定了」**：決定的標誌是你的行為改變了。因為你切斷了退路，行動就自然跟上了。

---

## 三、三類最重要的決定

**第一類：你選擇相信什麼**

> 「你現在擁有的每一個信念，都是你曾經做的一個決定——只是你可能忘記了。很多信念是你在很久以前做的決定，現在已經過期了。你選擇相信什麼，是你最有力量的決定之一。」

**第二類：你選擇和誰在一起**

> 「你和誰在一起，決定你會成為誰。你決定愛誰、嫁給誰、做誰的朋友、讓誰進入你的內圈——這些是巨大的決定。改變你身邊的人，你的人生就會改變。」

**第三類（最重要）：你如何詮釋你的人生**

在說第三類之前，Tony 說了一個徹底改變他對這個問題理解的故事。

---

## 四、印度的震撼——瓦拉納西的聖火

Tony 大約每 18 個月帶最頂尖的客戶做一趟特殊旅程：先去杜拜或阿布達比，住耗資十億打造的宮殿級酒店，用黃金餐盤進餐，享受地球上最奢華的體驗。兩天後，再去印度一座古老的城市：**瓦拉納西（Varanasi）**，又名「神聖之城」。

這是一座有 **3,500 年歷史**的城市，是印度教最神聖的朝聖地。印度教的信仰是：只要你死在這裡、在這裡火化，你就不必再進入下一次輪迴——你的靈魂直接到達涅槃（Moksha，解脫）。因此，這裡 24 小時不停燃燒著一把火，從未熄滅，燃燒了 **3,500 年以上**。人們從印度各地把臨死的至親帶到這裡，讓聖火將亡者的身體帶走。

Tony 說：「我第一次去的時候，坐在恆河上的小船裡，看著這一切在夜晚發生。火焰在河邊燃燒，煙霧瀰漫。**沒有人哭泣。沒有人悲傷。** 這讓西方人幾乎無法理解。

我看見一個小男孩，大概七八歲，手裡拿著一根棍子，輕輕地撥動著什麼——那個東西看起來像一根木頭。

但那不是木頭。**那是他祖父的腿。** 他在確保它完全燒進火裡。他的臉上帶著微笑。」

> 「西方人看到這個畫面，幾乎無法呼吸。但這正是信念的力量。**他們相信，身體燃燒，靈魂就自由了。** 那個小男孩的笑是真實的——是真實的喜悅，因為他的信念告訴他：『爺爺現在自由了。』**我們的信念決定了我們賦予每一件事的意義。意義決定了我們的感受。**」

**最貧窮者卻最快樂的人**：在杜拜的宮殿裡，住著全世界最富裕的人，卻有許多人鬱鬱寡歡。在瓦拉納西，有一個 92 歲的老婦人，正在垂死，一無所有。她非常憤怒——因為被醫生救活了，所以還不能進入涅槃。她在等著死，卻是這個地方裡**最快樂的人**，因為她知道她即將去的地方比這裡好一千倍。

> 「你在西方社會看到擁有一切卻悲慘的人，再看到這裡一無所有卻快樂的人。差異在哪裡？信念。信念創造意義，意義創造感受。你的外在環境不決定你的幸福——你的信念決定。這就是為什麼最重要的決定，是你選擇如何詮釋你的人生。」

## 五、妻子 Sage 的故事——九年的尋醫之旅（序）

Tony 的妻子 Sage，出生時因長達 48 小時的難產，用產鉗強制取出，傷及了她的**前庭系統**——控制平衡和空間感的神經系統。此後整個人生都伴隨著嚴重的**動暈症**：任何飛機必吐、任何船幾乎必吐、嘔吐如此頻繁讓胃酸長期腐蝕她的牙齒，體重一度降到零號身材（size zero），幾乎無法保住任何食物。

Tony 為她尋遍所有資源：頂尖醫生沒用、靈療師沒用、替代療法沒用、最後找到了 NASA 的太空醫學團隊也沒用。又找到了聖地牙哥「海軍頂尖戰機學校（Top Gun School）」的前庭系統再訓練裝置——有效，但只有 **10%**。

「九年，什麼都沒有用。」（故事將在下一章完整揭曉。）

**來源**：0313-3.en.srt，約 01:36–01:50
**核心概念**：Sage 動暈症奇蹟治癒、Christian G 與「美好狀態」、人生最重要的決定、容忍法則

---

## 一、妻子的奇蹟——來自印度

試遍所有西方醫學和靈療方法、九年都沒有結果之後，一個意外的電話改變了一切。

Tony 的一位物理學家朋友，妻子幾年前過世，他整整五年每晚以淚洗面，無法走出悲傷。有一天，他去拜訪一位住在印度的靈修導師——不是為了靈修，而是想**測量那位導師的頂葉（parietal lobes）腦波**。頂葉是控制空間感和自我邊界的區域，深度冥想者的頂葉活動與「與宇宙合一」的體驗有關。

但一件意外的事發生了：光是**待在那個人身邊**，不做任何事，只是待在同一個房間裡——透過**鏡像神經元（mirror neurons）的共振**，他自己的頂葉也自動平靜下來。從那一晚起，他再也沒有哭著入睡。悲傷沒有消失，但他感覺和亡妻比過去**更親近**，而不是永遠失去了她。

後來，那位物理學家在冥想中看見了 Tony 和 Sage 的畫面，打電話說：「我有一個直覺——你應該帶 Sage 去見那位導師。動暈症跟前庭系統有關，也跟大腦的平靜有關……也許……」

Tony 說，他在那個時間點沒有任何理由相信這會有用——西方醫學、NASA、靈療，全都失敗了。但他有一個感覺：「去。」

四天後——困擾了 Sage **整整九年**的動暈症，就此消失。再也沒有復發。

> 「那是上帝的恩典（God's grace）。我永遠心存感激。我說不清楚它是怎麼發生的，因為它超出了我對科學的理解。但它發生了，而且它是真實的。那個故事告訴我：有些答案在你試過的方法之外。永遠不要太快放棄。」

---

## 二、Christian G 的禮物：「美好狀態」這個詞

那位導師的兒子 Christian G，後來成為了 Tony 的摯友，在印度建立了「合一大學（Oneness University）」。

有一天，Christian G 坐下來和 Tony 聊天，說：「Tony，你所教的一切裡面，對我個人影響最深的，是你說的第一件事——**如何改變情緒狀態。** 我現在可以在一瞬間，從憤怒切換到好奇，從壓力切換到玩樂，從絕望切換到感恩。而且這是**真實的**——不是假裝的，是神經層面真實的狀態切換。」

然後他提出了一個建議：「你有很多方式稱呼那些正面的情緒狀態——顛峰狀態、高能量狀態……但如果把它們統一叫做一個詞：**美好狀態（beautiful states）**，把那些低能量的狀態——憤怒、沮喪、壓力、恐懼、焦慮——叫做**痛苦（suffering）**，你覺得呢？」

Tony 最初對「suffering」有點抗拒——不喜歡用那麼重的字眼來標籤壓力或憤怒。

Christian G 說：「很多人確實在受苦，只是他們不承認——他們把它叫做『壓力』、叫做『現實』、叫做『沒辦法』。如果我們叫它痛苦，他們才能真正看見它，然後選擇不要。」

然後 Christian G 說：

> **「我有一個靈性的願景——一個我做的決定：無論發生什麼，我都選擇活在美好狀態中。**
>
> 這不是說我沒有挑戰，不是說我沒有悲傷。這是說：不管外在發生了什麼，我的內在狀態不由外在決定。我選擇活在美好狀態裡，而且我把這個當成我最重要的決定。」

Tony 說：「**這個我要偷走。**」Christian G 笑說：「沒關係，我也偷了你的東西，扯平了。」

---

## 三、人生最重要的決定

Tony 承認，在過去很長一段時間，他以為「生氣讓我的大腦加速，幫助我解決問題」。憤怒確實讓腎上腺素激增，很多成功的商人都用憤怒作為驅動力。

但他後來發現：

> 「當我真正快樂時，當我在美好狀態裡——大腦一樣加速，我一樣能解決問題，甚至解決得更好。而且身邊沒有人受傷，我自己的身心也健康強壯。憤怒確實管用，但它的代價太高——你的健康、你的關係、你的長期能量，全部都付出了代價。美好狀態可以讓你達到同樣的結果，代價幾乎是零。」

他開始意識到，他的快樂過去有多依賴外部條件：孩子得是某個樣子、妻子得是某個樣子、員工不能出錯、市場得往某個方向走……

> 「這是非常愚蠢的策略。只要我的快樂取決於別人的行為，我就永遠輸了。我擁有幾千名員工，跨三大洲運營——現在這一刻，我幾乎可以保證，有人在某個地方搞砸了某件事。這是統計學事實。如果我把快樂綁在那上面，我就永遠不快樂。」

---

## 四、美好狀態不等於永遠微笑

> 「美好狀態不是永遠 happy happy happy——那根本不是人類，那是假的。**美好狀態可以是：快樂、好奇、慈愛、感恩、堅定、創意、熱情、玩樂——任何高能量的正面情緒都算。**」

> 「你當然還是會感受到憤怒、悲傷、恐懼、壓力。區別在於：你不再讓它們停留。你一感受到，就立刻切換，讓自己回到美好狀態。做的次數越多，切換就越自動，越省力。就像肌肉——訓練越多，動作越輕鬆。**你在訓練大腦把『回到美好狀態』變成預設模式。**」

---

## 五、「我們得到的，是我們所容忍的」

> **「我們得到的，是我們所容忍的——不只是我們容忍別人的那些，也包括我們容忍自己的那些。」**
> *We get what we tolerate — not only in others, but in ourselves.*

「你超重，是因為你容忍了對身體不好的行為——一天一天的，每次都覺得『就這一次沒關係』。你懷才不遇，是因為你容忍了自己一直停在舒適區。但有一天，你在沙灘上劃了一條線，說：**不再了。** 那就是決定的那一刻。」

> **「而我決定不再容忍的，就是讓自己離開美好狀態。這是我這輩子做過最重要的決定。**
>
> **生命太短暫，不值得受苦。（Life is too short to suffer.）」**

---

## 六、美好狀態如何影響周圍的一切

「當你處在美好狀態——你的孩子感受到。他們學的不是你說的話，而是你**是什麼**。你的情緒是他們情緒的鏡子。

當你處在美好狀態——你的伴侶感受到。那是真正的臨在，那是真正的連結，那是他們真正渴望的。

當你處在美好狀態——你的團隊感受到。你即使事情亂成一團，也能說『好，有問題，我們來解決，一起搞定』——那個能量改變整個組織的運作方式。」

> 「**活在美好狀態，是我所知道、一個人能為自己的卓越人生做出的最強大的單一決定。達成一切，不等於美好狀態。達成一切，不等於幸福。所以，真正的關鍵，就是這個決定。**」

**來源**：0313-3.en.srt，約 01:50–02:09
**核心概念**：期待是痛苦的根源、理由先於答案、感恩的神經科學、創造者 vs 管理者

---

## 一、痛苦最常見的觸發器：期待

> **「期待（Expectations）是痛苦最常見的觸發器。」**

想想你最近一次感到受傷、憤怒或失望——幾乎在每一個案例裡，底下都有一個期待：
- 你期待伴侶某個樣子，他們今天不是 → 你受苦
- 你期待孩子某個樣子，他們今天不是 → 你受苦
- 你期待這個世界某個樣子，它今天不是 → 你受苦

> 「人類天生就是多變的生物，謝天謝地。我們每個時刻都不一樣——我們的情緒在變，我們的能量在變，我們的行為在變。所以當你把你的快樂建立在『期待別人維持某種固定模式』上，你注定一次又一次地失望。」

**放棄期待 ≠ 降低標準**：標準是方向；期待是需要現實隨時符合那個方向的執念。一個給你力量，一個讓你受苦。

---

## 二、理由先來，答案後來

> **「理由先來，答案後來。（Reasons come first, answers come second.）**
>
> 如果你有足夠強的理由去做一件事，你自然會找到方法。但如果你的理由不夠強，就算你今天聽了最好的道理，你也只會說『有趣』，然後繼續老樣子。理由的強度，決定了改變能不能真的發生。」

**練習**：想像如果你真的做出了這個決定——無論發生什麼，活在美好狀態——你的人生在 6 個月後、12 個月後會是什麼樣子？你的關係、事業、身體、內在感受？

然後寫下：「為什麼你**必須**活在美好狀態？即使面對不公平，即使有人讓你失望，即使事情不按你的計畫走——你為什麼還是要選擇？」

---

## 三、感恩——最強大的解藥

> **「如何進入美好狀態？方法很簡單——找到一件值得感恩的事。任何一件。」**

你還在呼吸——這是一個巨大的禮物。你踩在土地上，而不是在土地下面。你有問題——那是生命存在的訊號。死人沒有問題。

> 「我們最大的問題之一，是以為自己不應該有問題。問題永遠不會消失，問題只會升級——你解決了小問題，就會有更大的問題。這不是壞事，這是你在成長的訊號。你解決問題的能力越強，你就越自由、越有活力。」

**感恩的神經不兼容性**：

> **「你無法同時感到憤怒又感恩。**
> **你無法同時感到恐懼又感恩。**
> **感恩，單獨一個，就能改變一切。（Gratitude alone could change it all.）」**

這有神經科學基礎：感恩的神經迴路和恐懼、憤怒、壓力的神經迴路在大腦中是相互抑制的——當一個活躍，另一個就被壓制。感恩從神經層面切換你大腦的迴路，讓你從威脅模式切換到連結和創造模式。

---

## 四、最艱難時刻的滿足

想一個場景——不是你最順利風光的時候，而是：你面對了一個極大的困難，幾乎撐不住了——但你撐過去了，而且是和你愛的人一起撐過去的。

> 「那是一種真實的驕傲——確知的感覺：我知道我是誰了。我穿越了一場風暴，我仍然站著，我的旁邊有人一起站著。這是上帝的恩典透過我們流向彼此。**這，是最深層的滿足。**」

---

## 五、創造者 vs 管理者

> **「你是你人生的創造者（the creator of your life），還是你的環境的管理者（the manager of your circumstances）？**
>
> 你選擇管理你的環境——被動地、等著條件對了才能快樂。還是你選擇創造你的人生——主動地、無論環境如何都選擇你的狀態。」

---

## 六、美好狀態是智慧，不是樂觀主義

> **「這不是關於正面思考。這是關於聰明。**
>
> 在爛的狀態下，你思維更慢，你做決定更差，你對待別人也更差——你的關係受損，你的團隊表現更差，你的身體也付出代價。
>
> 在美好狀態下，你思維更清晰，你找到解決方案更快，你對待別人更好——一切都更好。
>
> **選擇美好狀態，不是讓你感覺好的奢侈品——是讓你表現更好的策略。這是智慧，不是樂觀主義。**」

**讓決定變成肌肉記憶**：你不會每次都完美，從幾週到幾天，從幾天到幾小時，從幾小時到幾分鐘，從幾分鐘到幾秒。不是關於不犯錯，而是設立標準，然後不斷提高它。

## 一、讓決定不只是決定——10 天鞏固計畫

> 「光是當下的感動和決心，對大多數人來說是不夠的。因為你一走出這個房間，你的舊環境、舊人際關係、舊觸發源都還在。你需要一個機制，讓這個決定在未來十天裡持續強化——直到它開始變成你的新習慣，你的新身份認同。」

神經科學：新的神經路徑需要**反覆激活**才能變得穩固。一次強烈的體驗可以創造新路徑，但不反覆激活，它會慢慢弱化，舊路徑重新佔主導。

**做法**：把你剛才寫下的「為什麼你必須活在美好狀態的理由」，**每天早上讀一次、每天晚上讀一次，連續十天**。讓這些理由進入你的身體，不只是你的頭腦；讓它變成情緒記憶，不只是知識。

**抓到自己掉落：不懲罰，只切換**：

> 「當你開始做這個，你會發現自己陷入不好的狀態——這不代表你失敗了。這代表你的訓練正在起效，因為你在『注意到了』——以前你根本不會注意到，你只是活在那個狀態裡而不自知。**抓到了！很好。現在切換。然後繼續走。** 讚揚自己注意到了，不懲罰自己掉落了。」

---

## 二、寫兩封信——讓外部力量承接你的承諾

> 「在這個週末，寫兩封信——寄給你**最尊重的**兩個人。不一定是你最親近的人，而是你最尊重的人——因為你最不想在他們面前食言。」

**信的核心內容（六件事）**：
1. 我意識到過去，當我遇到挫折、感覺失控的時候，我讓那些情緒控制了我的反應，錯過了很多原本可以更美好的時刻
2. 我做了一個決定——我不再容忍自己停留在那些狀態裡
3. 我不是說我不會再感受到憤怒或恐懼——我會。但我不會讓自己**停留在那裡**超過必要的時間
4. 我寫信給你，因為你是我最尊重的人之一
5. 如果你在未來看到我不在美好狀態——你可以提醒我一句話：「**你現在想要待在哪裡？**」
6. 我想讓你知道，我正在認真承諾這件事

**為什麼要寫信？**
- **社會責任槓桿**：一旦有人知道你的承諾，你更難食言。這個槓桿遠比默默努力更有力量
- **給他們一份禮物**：你的信可能在他們心裡種下一顆種子——你在影響他們
- **關係的深化**：讓一個人看見你真實的掙扎和真誠的決心，往往讓關係更深

Tony 邀請大家也可以把信寄給他：**endsufferingnow@tonyrobbins.com**

## 三、觸發源的真相

> **「今天有一整個世代的孩子，被教導說：任何事情都可以觸發他們，他們不應該被觸發，所以社會有責任消除所有讓他們不舒服的觸發源。**
>
> 這是我聽過最愚蠢的策略。世界上永遠有讓你不舒服的事，你不可能控制所有的外部環境。**你把自己訓練成玻璃人——每一次你要求移除觸發源，你的神經系統就變得更敏感、更容易被觸發。這是惡性循環。**」

> 「你真正要做的，不是去除觸發源——而是去掉你對觸發源的反應模式。**當你把你的反應模式搞定，你就自由了。沒有任何人、任何情況再能控制你的狀態——這才是真正的自由。**」

---

## 四、識別你的「兩種最愛的痛苦口味」

> 「寫下你兩個最常用的、對你不好的情緒模式——你**最愛的兩種痛苦口味（two favorite flavors of suffering）**。在壓力下、在被觸發的時候，你的神經系統有一個預設的『跑回家』的動作。你跑去哪裡？」

常見的「痛苦口味」：
- 憤怒和批評（攻擊外部）
- 焦慮和擔憂（攻擊未來）
- 愧疚和自責（攻擊自己）
- 拖延和逃避（迴避）
- 控制和完美主義（通過控制管理恐懼）

「如果你不確定，去問你的伴侶、你的好友——他們一定知道。」

**三個深化問題**：
1. 什麼觸發了這些狀態？（越具體越好：不是「被批評的時候」，而是「在會議上說了想法老闆沒回應的時候」）
2. 當你被觸發，你的感受和行為是什麼？你變得更冷漠、更爆炸、更沉默？持續多久？影響了什麼？
3. 你可以做什麼來打破這個模式？

---

## 五、Tony 的高標準與它的反效果

Tony 說，他自己的「最愛痛苦口味」是**憤怒與挫折**——特別是當別人沒有達到他的高標準時。

他描述了他的標準：演講 12-13 小時，演講前三小時起床準備，演講後和團隊複盤到凌晨四點。「這種痴迷式的自我要求，是讓我能在二、三十年間持續進步的原因。我沒有辦法對不完美感到舒適。」

但高標準有一個副作用。有一次演講結束，一個團隊成員走向他，說：「我們不知道怎麼告訴你……我們弄丟了 $128,000 的現金。」

「那時候 $128,000 對我來說，等於今天的 100 億。我爆發了。」

那次爆發之後，他發現了一件事：

> 「從那之後，每次出了問題，他們都不敢立刻告訴我。他們等他們鼓起勇氣的時候，問題往往已經更大了。我以為是他們的問題——但其實是我**訓練了他們不敢來找我**。我的憤怒強度，讓他們不敢說實話。
>
> **我以為我在維持高標準，但我實際上在製造一個讓問題被隱藏的文化——這個文化讓我更難實現我的高標準。我的模式傷害的，是我最在乎的事。**」

> 「我一度以為，憤怒讓我思維清晰、快速。後來我發現：快樂的我也一樣清晰、快速——而且身邊沒有人受傷，我自己的身體也不會受損。**憤怒的我解決問題，快樂的我也解決問題——但代價完全不同。**」

## 一、$128,000 現金消失——完整故事

早期職涯，演講結束後一個團隊成員走來告知：弄丟了 $128,000 現金。

> **「那時候 $128,000 對我來說，等於今天的 100 億。」**

Tony 當場爆發——往後退一步、眼睛睜大、聲音升高：「你他媽的在開玩笑嗎？！你是怎麼做到的？！」然後把同樣動作語氣重複好幾遍。

**爆炸的後果**：從那之後，每次出了問題，團隊都不敢立刻告訴他。等到他們鼓起勇氣時，問題往往更大了。

> **「我以為是他們的問題——但我才是訓練他們不敢說實話的人。我以為在維持高標準，實際上在製造讓問題被隱藏的文化。我的模式傷害的，正是我最在乎的事。」**

## 二、觀察身體程式

打破情緒模式第一步：**仔細觀察進入那個狀態的具體身體動作**。

Tony 的「進入憤怒」程式：
1. 往**後退**一步
2. 眼睛**睜大**、眉頭緊皺
3. 下巴**緊繃**、脖子收緊
4. 聲音**升高加速尖銳**
5. 第一句話：「你他媽的在開玩笑嗎？！」
6. 把同樣動作語氣**重複**，憤怒越燒越旺

---

## 三、「這真有趣！」——設計相反程式

- 憤怒 = 往後退、收縮 → 設計相反：**往前傾**（好奇、開放姿態）
- 憤怒 = 高亢尖銳 → 設計相反：**平靜好奇、帶點幽默**
- 憤怒的第一句 = 爆炸批評 → 設計相反：

> **「這真有趣（That's fascinating）。你是怎麼在這麼短的時間裡弄丟這麼多錢的？」**

**在家反覆練習**：在腦海中重演場景，練習新反應——一遍再一遍。

> 「你不能等到現實中發生才希望有新反應。必須先在神經系統裡建立那條新路徑——就像運動員賽前在腦海反覆演練。」

**現實中第一次切換**：對方眼神從「我要死了」轉為「他不會殺我？！我可以說實話？」——最後還真的找回了那筆錢。

> **「在好的狀態下解決問題，效果一樣好，代價大幅降低。」**

---

## 四、打破模式三步驟

**步驟一：觀察身體程式**
- 身體往哪個方向移動？呼吸如何改變？肌肉哪裡緊繃？
- 心裡說的第一句話是什麼？越具體越好

**步驟二：設計打斷動作或詞語**
- 完全相反的身體動作
- 相反的語言——可以是幽默或好奇，不需要「完美的回應」
- 讓新反應有點好玩——幽默是切換情緒最快的方式之一

**步驟三：反覆練習直到自動**
- 腦海中重演觸發場景，練習新反應
- 日常中每次觸發出現立刻用新動作打斷
- 一開始需要有意識，練習夠多後自動化

> **「這是技術，不是想法。技術需要練習，不是聽了就會。」**

## 五、手機成癮與可變獎勵

統計數字：30歲的人平均每天解鎖手機150次、使用10小時39分鐘、觸碰螢幕2,617次。73%的人說沒有手機會嚴重焦慮。

**可變獎勵（Variable Reward）**——賭博心理學：

> **「如果手機每次都給你好消息，你不會沉迷。但因為給你的是不可預測的——有時開心、有時憤怒、有時焦慮——你一直想看：下一次是什麼？這和吃角子老虎機完全一樣。」**

> **「我們被科技設計成對痛苦上癮。負面情緒比正面情緒更讓你黏在螢幕上——因為有人用你的時間在賺錢。你不是在消費內容，你是被內容消費了。」**

這正是為什麼「活在美好狀態」需要主動訓練——這個時代的一切都被設計成把你帶離美好狀態。

---

## 六、全場書寫與分享

**三個問題**：
1. 你兩個最愛的痛苦口味是什麼？
2. 什麼觸發了它們？
3. 你可以做什麼來打破這個模式？

**核心概念**：活在美好狀態三個工具、90秒法則、Qantas奇蹟故事、Loss/Less/Never三個痛苦觸發字、HeartMath心腦同步練習

## 一、活在美好狀態的三個關鍵工具

**工具一：做出真正的決定，並持續強化**
- 決定本身不夠，需要機制讓它持續十天
- 設計提醒系統：手機計時器、螢幕便利貼、鏡子上寫理由
- 目標：從意識選擇變成預設狀態

**工具二：預先演練被觸發的情境**
- 知道什麼觸發你，就能預先練習跳出那個狀態
- 用**玩樂性地**練，不要嚴肅地練——讓它變成遊戲
- 練到你開始**期待被觸發**，因為成功切換本身變成成就感的來源

**工具三：90秒法則**

> **「我不讓自己停留在不好的狀態。我的目標：在90秒內跳出來。」**

為什麼是90秒：
> **「你什麼時候想殺一隻怪獸？當它還是小嬰兒，不是等它變成哥吉拉把你的城市吃掉。情緒越早抓到越容易切換。在不好的狀態停留10分鐘、30分鐘，那個狀態就有了慣性，越來越難跳出來。」**

Tony 的個人進步曲線：90分鐘 → 60分鐘 → 30分鐘 → 5分鐘 → 90秒
「有一天我開始**期待被觸發**——因為成功切換帶來一種特殊的滿足感，幾乎是興奮感。」

---

## 二、痛苦的底層真相：焦點在自己

> **「要受苦，你必須把焦點放在自己身上。痛苦永遠和你有關。」**

例子：孩子在學校表現不好 → 你受苦是因為你告訴自己「這反映了我的失敗、我讓孩子失望了、我是不夠好的父母」。如果只是觀察問題，沒有自我評估，你只會問「我能怎麼幫他？」——那是行動，不是受苦。

> **「脫離痛苦的方式：從期待和自我評估中解脫，找到一件可以感恩或欣賞的事。注意力從自己，移向感激。」**

---

## 三、Qantas 故事——奇蹟如何在七分鐘變成期待

Tony 每年多次飛澳洲，從佛羅里達到雪梨單程近20小時，當時長途飛機沒有網路。

有一天登上Qantas班機，起飛後機長廣播：「**這是Qantas史上第一次在國際航線提供機上網路服務，是歷史性的時刻。**」

整個艙內歡聲雷動，乘客起立鼓掌——Tony 也跟著鼓掌，心想：「太好了，我可以在飛機上工作了。」

七分鐘後，網路斷線了。整個艙內氣氛立刻變成憤怒：「這家公司是怎麼搞的！？他們剛才還說是歷史性的時刻！」

> **「七分鐘前，這是奇蹟——飛機上有網路，從來沒發生過。七分鐘後，它已經變成期待——我理所當然應該有網路，而且應該完美運作。**
>
> 我們在七分鐘之內，把一個奇蹟當成了理所當然。科技把我們訓練成極度沒有耐心，把每一個新的便利視為「我應得的最低標準」，然後每次有偏差就憤怒。」

---

## 四、核心公式：把期待換成感恩

> **「把你的期待換成感恩（Trade your expectations for appreciation），你的整個人生就在那一刻改變了。」**

不需要從憤怒直接跳到欣喜若狂——只需要從憤怒，移動到「找到一件可以感恩的事」：
- 「至少我有飛機可以坐」
- 「這趟旅程我還是平安的」
- 「我還有其他工作可以做」

---

## 五、Loss、Less、Never——痛苦的三個觸發字

> **「幾乎所有人類痛苦都可以追溯到三個字：Loss（失去）、Less（更少）、Never（永遠不）。」**

- **Loss**：你相信你失去了珍視的東西——時間、金錢、機會、愛、尊重
- **Less**：你相信你將得到更少——更少的愛、機會、可能性、時間
- **Never**：你相信你永遠不會得到某樣東西——「我永遠不會被愛」、「那種機會永遠不會再有了」

> **「但Loss, Less, Never全都是謊言。永遠都有新的東西、新的方向、新的可能性。不是更少——如果你找到創意，永遠有更多。沒有『永遠不』——只是另一條路、另一個方式、另一個時間點。」**

> **「在90秒內找到一件可以感恩、欣賞或去愛的事——痛苦就消失了。」**

---

## 六、HeartMath 研究——心腦同步的科學

**HeartMath**（心臟數學研究所，加州，研究曾被提名諾貝爾獎）

**挫折狀態**：心跳電訊號（紅線）與腦波（藍線）完全不同步——鋸齒形、混亂、互相衝突。這正是：
- 車禍最常發生的時刻（反應時間被拖慢）
- 說出最傷人的話的時刻（前額葉被情緒中樞蓋過）
- 判斷力、創造力和洞察力大幅下降的時刻

**感恩練習兩分鐘後**：同樣的人，兩條線幾乎完全重疊——波形和諧規律，完美同步。

> **「心臟在懷孕第三週就開始跳動，比大腦更早發育。心臟影響腦波，腦波也影響心臟。如果你知道如何使用心臟，可以在兩分鐘內從混亂切換到清晰。這就是感恩的神經科學。」**

---

## 七、HeartMath 完整練習（約兩分鐘）

**準備**：想一件近期壓力值7-10分的未竟之事（你知道需要解決，但一直在拖的事）

**Step 1：站立，雙手放在心臟上**
- 實際觸摸心臟位置——創造身體層面的注意力錨點，讓意識從頭腦移向心臟

**Step 2：閉眼，感受心臟的力量**
- 深呼吸，想像血液流進心臟、心臟泵向全身
- 「你的心臟今天跳了超過十萬次，一天都沒有停。**你不需要做任何事就已經值得被愛。**」

**Step 3：感恩記憶——全身進入**
- 回到三個讓你深深感恩的具體時刻
- 關鍵：不是在外面觀看，而是**全身進入（Association）**——從自己眼睛看出去、聽當時的聲音、感受當時的感受
- 依次感受：感恩時刻 → 驕傲時刻 → 和朋友家人的美好時刻 → 笑到不行的時刻 → 浪漫連結的時刻 → 想實現的未來時刻（預先感受實現時的喜悅）
- 每個時刻，讓感覺充滿全身，然後放大——兩倍、三倍

**Step 4：把所有感受帶回心臟**
- 雙手再次輕壓心臟：「這就是我真實的人生，充滿了感恩、美好和連結。」

**Step 5：讓心臟回答那個問題**
- 帶著心腦同步的清晰狀態，讓心臟（不是頭腦）回答：
- **「關於那個情況，我真正需要記得的是什麼？我真正需要聚焦的是什麼？我真正需要做的是什麼？」**

> **「95%的人在這個時候立刻就知道答案了。不是因為不知道——而是在混亂的心腦狀態下，答案被壓力和恐懼的噪音蓋住了。在心腦同步的美好狀態下，清晰度是最高的。答案從來都在那裡，只是你現在能聽見了。」**

| 核心公式 | **把期待換成感恩，你的整個人生就在那一刻改變了** |
| Loss/Less/Never | 三個痛苦觸發字，全都是謊言 |
| HeartMath研究 | 感恩讓心腦同步，提升清晰度和洞察力 |
| 完整練習 | 觸碰心臟→感受心跳→全身進入感恩記憶→心腦同步→讓心臟回答 |

**來源**：0313-4.en.srt，約 01:22–02:10
**核心概念**：恐懼是唯一障礙、兩種根本恐懼、四種適應策略、恐懼的合氣道、三角架（生理/聚焦/語言）、Tony 17歲語言轉化故事

## 一、唯一能長期停止一個人的力量

> **「恐懼（Fear）。唯一能讓一個人長期停在原地的，只有恐懼。」**

人們告訴你各種理由——沒有資源、時間、機會。但如果沒有恐懼，他們自然會找到方法。

> **「壓力（Stress），是成就型人士對恐懼的委婉用語。「萬一這件事不成功怎麼辦、萬一讓大家失望怎麼辦」——那就是恐懼。只是聽起來更像成功人士的問題。」**

全場常見的恐懼清單：被拒絕、失敗、成功（「如果成功了，會有更大責任、失去自由……」）、讓別人失望、感覺自己不夠好、焦慮本身

「有人同時有失敗的恐懼和成功的恐懼——你們完全被搞定了。」

---

## 二、兩種根本恐懼——全人類共有

無論億萬富翁、好萊塢演員、頂尖運動員、囚犯、單親媽媽，所有恐懼最終追溯到兩個根本：

> **「第一：我不夠好（I'm not enough）。**
> **第二：如果我不夠好，我就不會被愛（I won't be loved）。**
> **愛，是靈魂的氧氣。」**

嬰兒如果沒有被觸碰、被愛，會發展出「無法茁壯綜合症（failure to thrive syndrome）」——真的因缺乏愛而死去。我們從根本上，需要被愛才能生存。

---

## 三、為什麼我們有這兩種恐懼——演化解釋

> **「人類嬰兒需要依賴別人大約15-18年才能真正獨立——在生物界極端罕見。你把嬰兒丟進森林，他必死無疑。」**

**催產素的魔法**：嬰兒出生時，媽媽的催產素（愛的藥物）大量釋放，媽媽的水平是爸爸的十倍。

> **「當媽媽在催產素的狀態裡，你就是全世界最美麗的東西。你哭，她來；你睡，她看著你。你的存在本身就帶來了愛——無條件的。」**

**催產素退去的那天**：嬰兒幾個月大，深夜，媽媽精疲力竭。嬰兒做了同樣的事——但回應不同了。

> **「更糟糕的是無視你。你的哭聲消失在空氣裡。就在那一刻，恐懼進入了你的身體。你的嬰兒大腦學到：愛是有條件的。我必須做某些事，才能得到愛。」**

---

## 四、四種適應策略——行為模式的起源

**成就者（Achiever）**：嬰兒走路、達成了什麼，全家歡呼。大腦記錄：**達成 = 得到愛。**
> **「成就者用一生不停追求成就，試圖證明自己值得被愛。但那個需要被愛的嬰兒從來沒長大——所以永遠覺得不夠，永遠需要下一個成就。」**

**破壞者（Disruptor）**：乖乖的沒人注意，搗亂鬧事大家都來了。大腦記錄：**製造問題 = 得到關注 = 某種連結。**
> **「不是因為他們壞，而是破壞是他們學到的得到連結的方式——就算連結是憤怒或懲罰，也比被無視要好。」**

**喜劇演員（Comedian）**：搞笑的聲音，全家圍過來笑。大腦記錄：**讓人笑 = 得到愛和連結。**
> **「最極端的例子是羅賓·威廉斯。他讓所有人笑了，但從來不讓任何人真正了解他。如果停止表演，他不知道自己還剩下什麼。」**

**取悅者（Pleaser）**：只要不哭很乖，照顧者留著；鬧的話，照顧者消失。大腦記錄：**滿足別人需求 = 安全和連結。**
> **「他一生都在問：你需要什麼？他的自我價值完全依附在『我讓別人快樂了』上。最受歡迎，也最容易被忽視和利用。」**

---

## 五、Carol Dweck——表揚方式塑造一代人

史丹佛大學心理學教授 Carol Dweck 的研究：

> **「我們犯的最大錯誤，是告訴一整代孩子：你很聰明、你很特別、你無與倫比。家長以為在建立自信，但實際上在種下恐懼的種子。」**

- **表揚結果**（「你真聰明」）→ 孩子害怕挑戰、選擇簡單任務、形成**固定型心態**
- **表揚努力**（「我喜歡你努力的方式」）→ 孩子學到挑戰是成長機會、形成**成長型心態**

「一整代人被告訴他們很特別，同時害怕任何真正的挑戰。他們用左右滑手指選伴侶，因為如果這個不對還有下一個——不需要真正投入、面對恐懼。底層依然是：**我不夠好。**」

---

## 六、FEAR 的真正意思

- 常見版：**F**alse **E**vidence **A**ppearing **R**eal（看起來真實的假證據）
- 現實版：**F everything and run（遇事就逃）**

> **「當人感到恐懼，他們逃。逃避對話、決定、行動、面對讓他們恐懼的事。」**

---

## 七、對付恐懼的合氣道

Tony 請一個參與者上台用雙手緊握他的手腕，代表恐懼。示範三種選擇：

1. **假裝恐懼不存在**：試著往前走，對方還是抓著，動不了。「恐懼還是在那裡，你只是在自欺欺人。」
2. **正面對抗**：硬碰硬拉扯，對方越抓越緊。「對抗恐懼，恐懼反而更強，因為你在給它更多能量。」
3. **合氣道**：與對方同向旋轉，讓對方的力量帶著一起移動，直到對方失去平衡——Tony 從未受傷，也從未被停住。

> **「不要假裝恐懼不存在。不要對抗它。和它共舞——認識它，說：『是的，我感到恐懼。』然後往那個方向走。使用恐懼的能量，而不是被它壓制。」**

**恐懼和興奮是同一件事**：讓全場做「非常害怕」的身體狀態——緊張的肩膀、快速的呼吸、大開的眼睛。然後在這個完全相同的狀態下，臉上放一個大大的微笑。

全場回答：「興奮！」

> **「恐懼和興奮，是幾乎完全相同的生理反應——心跳加速、呼吸加快、腎上腺素分泌。差別只在幾條臉部肌肉，改變了大腦的詮釋和神經化學。重新標籤它：『我是興奮的，不是恐懼的。』你的身體不知道差別。」**

---

## 八、什麼控制人生的品質：三角架

> **「意義創造情緒，情緒決定你人生的品質。同樣的事情發生——失去工作。意義一：我的人生毀了，我是失敗者→感到被摧毀。意義二：這是找到更適合我的事的機會→感到能量和可能性。外在事件相同。意義不同，一切不同。」**

> **「複雜是執行的敵人（Complexity is the enemy of execution）。」**

**三角架（The Triad）**：意義與情緒由三個因素共同塑造

> **「改變任何一個，你的狀態就改變了。改變三個，你徹底改變了。」**

---

### 第一個力量：生理狀態（Physiology）

> **「Physiology First。如果你感受不到你想要的感受，是因為你用身體的方式——臉、呼吸、動作，你可以在瞬間改變任何一個。」**

人常用喝酒、吃東西、抽菸來改變生理狀態——都有效，但有副作用。
**你可以用動作、呼吸、聲音達到同樣效果，沒有任何副作用。**

哈佛大學 Amy Cuddy「力量姿勢（Power Pose）」研究：站成超人姿勢維持兩分鐘：
- 睪酮素平均上升 **20%**（驅動行動力、自信）
- 皮質醇（壓力荷爾蒙）下降 **25%**
- 願意承擔風險的程度提高 **33%**

---

### 第二個力量：聚焦（Focus）

> **「聚焦等於感受（Focus equals feeling）。你聚焦在什麼，你就感受到什麼——即使那件事根本不是真的。**
>
> 聚焦在缺少的→感到壓力和匱乏。聚焦在無法控制的→感到崩潰和無力。說「我不能控制一切，但我能控制這些重要的事」→感到掌控感和能量。同樣的現實，不同的焦點，完全不同的感受。」**

---

### 第三個力量：語言/意義（Language / Meaning）

語言不只是表達感受的工具——語言**創造**感受。

> **「當你說：『她刺傷了我的背』，你的大腦把這當作真實的身體攻擊來處理，讓神經系統進入恐懼或憤怒模式，釋放壓力荷爾蒙。如果你說：『她讓我失望了』——失望是可以面對和修復的，「被刺傷」讓你感覺自己是受害者。語言選擇直接影響你的神經化學。」**

**Tony 17歲的語言轉化故事**：17歲聖誕夜，父親離開家，幾天後母親把他趕出門。他睡在朋友家洗衣房裡，一直對自己說：「我好沮喪。」

後來讀到 Claude M. Bristol 的《信念的魔法》：「你用什麼語言，你的神經系統就會建立那個生物化學。你重複某個詞，你就把那個狀態鞏固了。」

> 「我他媽的一直在說我好沮喪。然後我做了一個決定——**只有失敗者才會沮喪。我知道我不是失敗者。所以我不再使用那個詞。**
>
> **從那一天到現在，超過四十年，我從未再說過「我很沮喪」。** 我有過低谷、幾乎破產、感情結束、失去至親——但從未感到沮喪。不是因為沒有困難，而是我不使用那個語言，我就不進入那個生物化學，我就不建立那個神經迴路。」

**斯科托馬（Scotoma）**：眼科術語，視覺盲點。心理學借用：當你持有某種信念，大腦在現實中建立盲點——讓你看不到與信念衝突的東西。
> **「改變信念，才能改變你能看見什麼。」**

**來源**：0313-4.en.srt，約 02:24–03:06
**核心概念**：六大需求框架、需求比價值觀更強大、三需求成癮法則、前四個vs後兩個需求、奧薩馬與消防員對比

---

## 一、框架的核心前提

> **「我在全世界195個國家工作過，每一個地方的人都有這六個需求。你可以把一個人打開，像書一樣讀，因為你知道他們需要什麼。」**

所有人有相同的六個需求，但我們不平等地重視它們。兩個關鍵差異：
1. **哪個需求是你的第一優先**——決定你人生的方向，是所有行為的潛意識指南針
2. **你用什麼方式來滿足它**——正面、中性、或負面的方式

**震撼性洞見：需求比價值觀更強大**

「舉手，如果你認為自己是個誠實的人。」（幾乎所有人舉手。）「那——為什麼誠實的人還是會說謊？」

> **「因為當你認為說實話會讓你失去愛、失去確定性、失去重要感——你的需求會壓過你的價值觀。當人們做了背叛自己價值觀的事，背後永遠有一個需求在驅動。找到那個需求，才能真正理解那個人，也才能真正幫助他們改變。」**

---

## 二、需求一：確定性（Certainty）

**核心**：避免痛苦、感到舒適、擁有控制感、有一致性、有安全感

**夏威夷地板搖動的故事**：Tony 在夏威夷辦研討會，讓幾千人同時跳躍充能，整個建築物地板開始真的上下波動。

> **「當你不確定地板會不會繼續撐著你，你有辦法好好聽我說話嗎？完全不可能。確定性一旦被威脅，大腦進入求生模式——什麼都學不進去，因為大腦100%的資源都在問：我安全嗎？」**

最終解決：把場地分七個區輪流跳，像墨西哥波浪，避免地板共振繼續。

**滿足方式**：
- 正面：健康的例行儀式、穩定計畫、穩定的關係
- 中性：聽熟悉的音樂、看已看過的電影
- 負面：悲觀主義（「反正都不會成功」免於失望）、拖延（不嘗試就不失敗）、抽菸

**抽菸與確定性**：抽菸滿足確定性——每次拿起一支菸，你知道接下來5分鐘的感受：深呼吸的放鬆感、熟悉的儀式感、從壓力中短暫撤退。加州曾用電擊戒菸，成功後許多人開始暴食——確定性需求還在，只是換了方式。

> **「你不能只移除一個行為，你必須用另一個滿足同樣需求的行為替換它，否則大腦會自動找替代品。」**

---

## 三、需求二：不確定性/多樣性（Uncertainty / Variety）

**核心**：需要驚喜、挑戰、新鮮感、刺激感、多樣性

「你喜歡驚喜嗎？——你喜歡你想要的驚喜。你不喜歡的驚喜，你叫它什麼？**問題。** 而你需要問題才能成長。」

> **「熱情存在於不確定的領域裡。你已經完全掌握的事情你做得熟練，但對它感到無聊透頂。面對新的挑戰，即使有點恐懼，你也感到那種讓你活著的感覺——那就是多樣性需求在起作用。」**

> **「真正的目標不是『永遠不用工作』——那最後讓你感到空虛。真正的目標是：有足夠的錢讓你不需要工作，然後你選擇工作。那種選擇帶來的自由感，讓你走路的姿態都不一樣了。」**

---

## 四、三需求法則：上癮的科學

> **「如果你做一件事、想一件事、感受一件事，而你的大腦連結到這件事可以同時滿足至少三個需求——你就會對那個行為上癮。不管它是什麼。」**

- 滿足 **1個需求** → 有點興趣，可以停止
- 滿足 **2個需求** → 真正投入，放棄有點難
- 滿足 **3個以上** → **成癮**（正面或負面皆然）

**負面成癮——毒品**：同時滿足確定性（知道吸了後的感受）+ 多樣性（完全不同的感覺狀態）+ 重要感（在某些文化中讓你「成為某種人」）

**正面成癮——運動**：確定性（每次運動後感覺好）+ 重要感（「我是照顧身體的人」的身份認同）+ 連結感（跑步社群、健身房夥伴）

> **「持久的不是意志力——意志力從不持久。持久的是滿足感。當一件事滿足你的多個核心需求，它就變得毫不費力。」**

**已看過的電影的例子**：確定性（確定它很好）+ 多樣性（忘得夠多還是有驚喜）→ 滿足兩個需求 → 你明知結局還是願意再看。

---

## 五、需求三：重要感（Significance）

**核心**：感到獨特、特別、重要、被需要、有別於其他人

「就算有人說『我不需要被別人覺得特別』——那本身就是一種『我比那些需要這個的人更覺悟』的宣示，那也是重要感。你無法逃脫它。」

**在親密關係中的威力**：

> **「如果你的伴侶開始覺得有什麼東西或有誰比他們更重要——那是一段關係痛苦的死亡喪鐘。就算是孩子、工作、或使命。你必須有意識地讓伴侶感到被看見、被重視。」**

**滿足方式**：
- 正面：卓越的工作表現、成為慷慨的給予者、獨特的創意表達
- 負面：貶低別人（讓自己感覺更高）、使用問題或病痛獲得關注、暴力

**暴力是最廉價的重要感**：「如果一個陌生人突然把槍指著你，他在你生命中的重要程度是幾分？**十分，立刻。** 對那些在日常生活中感到不重要的人，暴力是最快、最便宜的方式獲得重要感——讓一個被忽視的人在幾秒內變成所有人注意力的中心。那非常可悲，但那就是人類行為的現實。」

**巴菲特的反向自我象徵**：Buffett 從不開賓士，開卡車。「**反向自我象徵：我如此特別，不需要開好車來向你證明我的特別。這本身就是特別的展示方式。**」

---

## 六、需求四：連結感與愛（Connection / Love）

**核心**：感到被愛、與他人連結、有歸屬感、感到親密

> **「大多數人寧願選擇連結感，而不是真正的愛——因為如果真的去愛，也可能被拒絕、受傷、失去愛。所以他們退而求其次，待在連結感的層次——像真正的愛的麵包屑。他們願意接受碎片，而不是冒險要整個蛋糕。」**

**Tony 對孩子的愛的故事**：有段時間待在不快樂的關係裡，把對伴侶的愛投入到孩子身上。「我以為孩子的愛更確定。但我後來意識到，我把孩子當成了親密關係的替代品。**榨取孩子的愛和真正愛你的孩子是兩回事——把孩子變成你愛情的替代品，對孩子不公平，對你也不公平。**」

---

## 七、奧薩馬賓拉登與9/11消防員——相同需求，不同選擇

> **「無論任何人做了什麼，他們都有理由。你的工作不是評判他們，而是理解是什麼需求在驅動他們。」**

**奧薩馬賓拉登**：第一需求是**重要感**——讓整個世界注意到他，把名字刻在歷史上。他成功了，每個人都知道他的名字。用了最恐怖的方式。

**9/11的消防員**：明知可能死，還是衝進燃燒的大樓。第一需求也是**重要感**——但選擇用犧牲自己完成比自己更大的使命。用了最崇高的方式。

> **「相同的需求——重要感。截然不同的選擇。如果你真的想幫助一個人改變，必須先理解他們試圖滿足什麼需求，然後幫他們找到更好的方式來滿足它。」**

---

## 八、前四個需求 vs. 後兩個需求

> **「前四個需求（確定性、多樣性、重要感、連結感）是你的『個性需求』——每個人都會找到方法去滿足它們，無論如何，積極的或消極的。問題只是：你在3分的水準滿足它們，還是8分的水準？」**

---

## 九、需求五：成長（Growth）

> **「我們必須成長。你成長，或你死去。沒有中間地帶，沒有平台期。**
>
> 如果你的關係沒有在成長，它在死去——緩慢地，但它在死去。如果你的事業沒有在成長，它在死去。不要騙自己說你在「維持」——你只是還沒注意到你在退步。」**

---

## 十、需求六：貢獻（Contribution）

> **「我們成長，是因為我們有東西可以給予。」**

「當你體驗到一件美好的事，你第一個本能就是想把它分享給你愛的人——那就是貢獻的需求。」

> **「當你分享一件美好的事情時，你的能量增加了，還是減少了？——增加了。這就是我們的設計。給予讓你的能量倍增，不是消耗。那些只滿足前四個需求但沒有在真正成長和貢獻的人，感到空虛，找不到意義——因為他們沒有啟動靈性層的需求。」**

---

## 十一、全場自我探索練習

針對前四個需求，各回答兩個問題（正面方式 + 負面方式）：

- **確定性**：固定的晨間儀式、定期存款 vs. 悲觀主義、拖延
- **多樣性**：學習新技能、旅行 vs. 一直開始新計畫卻不完成、過度刷手機
- **重要感**：卓越的工作成果、影響他人 vs. 批評別人讓自己顯得更好、「沒有你不行」的感覺
- **連結感**：真摯的深度對話、共同完成困難的事 vs. 為避免衝突而說謊、用社群媒體「讚」替代真實連結

---

## Day 1 完整結語

> **「今晚回去，做兩件事：**
> **第一，把你的理由寫下來——你為什麼必須活在美好狀態，每天讀兩次，持續十天。**
> **第二，寫那兩封信，給你最尊重的兩個人。**
>
> 你已經有了工具。現在要問的是：你選擇成為你人生的創造者，還是你環境的管理者？**你的大腦在消化今天的一切——它在你睡覺的時候，還在工作。**」**

**主講人**：Joseph McClendon III（引導分享）、Renee Marino（開場主持）
**核心主題**：板破後的信念轉化、行動創造信念、見證的神經科學意義、UPW 身體先行哲學

## 一、三位學員見證分享

Day 2 早上，Joseph McClendon III 沒有直接開課。他說：「我想聽你們說話。」

---

### 故事一：Lori——母親在女兒面前的突破

Lori 幾乎是哭著走上台的。眼眶在走上台階時就已經紅了，接過麥克風深吸一口氣，聲音在某幾個字上輕微顫抖。

她告訴全場：昨晚她女兒也在場，站在台下，用手機拍下了媽媽整個板破過程的影片。

> *「昨晚，在我舉起那塊板子，在我準備出手的那一秒鐘，我腦子裡沒有在想那塊板子。我想到的是我女兒。」*

她停了一下。

> *「我想到的是，我一輩子告訴她——要勇敢，要相信自己，你可以克服任何困難。我說這些話說了多少年了。每次她害怕，每次她覺得做不到，我都是那個告訴她『你可以的』的人。」*

> *「然後昨晚，她看著她的媽媽。不是在聽媽媽說什麼，而是在看媽媽做什麼。她看著她媽媽站在一塊木板前面，看著她媽媽的手在發抖，然後她媽媽出手了。那塊板子斷了。我的孩子看見了她的媽媽說她做得到，然後她真的做到了。」*

她說：「那不是一塊木板。那是我給她最真實的禮物。」

Joseph 在她分享完後說：
> *「你剛才給了這個房間裡每一個父母、每一個領導者最重要的一堂課：你想要影響的人，不是在聽你說什麼，他們是在看你做什麼。你的行動，是你真正的信念宣告。」*

**核心洞見**：言行一致的力量——孩子不聽你說什麼，孩子看你做什麼。

---

### 故事二：Tim——理性主義者，與恐懼穿的那件西裝

Tim 走上台，帶著工程師特有的謹慎，笑了一下給自己緩衝，然後說：「我要說一個讓我不太舒服的事。」

**背景**：Tim 有工程師背景，帶著懷疑來的。來是因為老婆報名，他說「好」，心裡想的是「反正就試試看」。

**木板上只有一個 X**：被引導寫下想突破的事時，Tim 拿著筆想了很久。他知道自己的問題是什麼——已經迴避超過五年。但不想用文字寫出來，太真實，太裸露。所以只寫了：**X**。

「X 就是 X。我自己知道那是什麼就好。」

**站在木板前的那幾秒**：那幾秒，他的大腦做了他形容為「高效的計算」——計算的不是如何打斷木板，而是所有不應該打的理由。他一條一條列給全場聽，語氣帶著自我嘲諷：

> *「它告訴我，我的手可能會受傷。（後來查了，受傷率極低。）*
> *它告訴我，這整件事沒有邏輯上的意義。（說得有道理，但讓我更不想出手。）*
> *它告訴我，我可以象徵性地出手就好，不一定要真的打斷。（這個聲音，我覺得最危險。）」*

然後他說了讓全場安靜的話：

> *「就在那幾秒鐘，我忽然意識到一件事。這個模式——我的大腦在我要做一件重要的事情之前，非常有效率地找到所有不去做的理由——這個模式，我在生命中其他地方也見過。」*

> *「我以為我是一個理性的人。但那一刻，我看到了一個真相：我的所謂理性，在很多重要的時刻，只是恐懼穿上了西裝。它穿得很像樣，說話很有邏輯，聽起來非常負責任。但它做的事，和普通的恐懼完全一樣——它讓我不動。」*

**他出手了**。拳頭正中那個 X。他沉默了很久，讓太太問他還好嗎，他說：「讓我待在這裡一下。」

> *「那不只是木板斷了。是我意識到，我一直以為是我『清醒』和『理性』的那個部分，其實一直在幫我逃跑。」*

**核心洞見**：**理性有時候只是恐懼的偽裝。** 你有多少「再想想」的背後，其實是恐懼穿著西裝？

---

### 故事三：Justina——帶著哀傷，仍然用全力

Justina 上台，讓自己站穩，然後說出的第一件事：

她的母親，**兩週前**，在自家公寓裡過世了。

全場瞬間安靜。

她沒有哭。臉上有一種沉澱下來的悲痛，不是壓抑，是某種已經和那個事實相處了兩週之後的狀態。

「我來這裡，是我媽媽走了之後做的決定。」

她說，昨晚在板破之前和之後，她完成了「兩件她一直沒有勇氣去做的事」。她沒有說是什麼。全場的人把自己的「一直沒有勇氣去做的事」放進了那個空白。

> *「那個木板，對我來說，不只是一個我想突破的目標。那個木板，是我對我媽媽的承諾。是我說：我會成為她希望我成為的那個人。」*

她停了一下。

> *「我用了兩隻手。」*

全場安靜地等待。

> *「因為我值得用全力。」*

Joseph：
> *「Justina 告訴了我們：即使在你最深的痛苦裡，你依然有選擇——你選擇用什麼力量面對那個痛苦。她選擇了愛。她選擇了全力。她選擇了前進。那不是任何人教給她的道理。那是她在人生最難的時刻，自己做出的決定。」*

**核心洞見**：哀傷與前進不是矛盾的。「我值得用全力」——不只說這件事值得努力，而是「我這個人，值得讓我自己全力以赴。」

---

## 二、為什麼板破是 UPW 的核心儀式

板破不是表演，是一個**刻意設計的、低風險版本的生命挑戰**。

**板破的物理真相**：
- 一塊標準松木板，成年人用正確手法可以打斷
- UPW 教練事先說明動作要領：哪個部位接觸、重心移動、出手時機
- 即使知道技術，站在木板前，身體仍然出現恐懼的完整神經化學反應：皮質醇升高、腎上腺素分泌、心跳加速、手心出汗、大腦開始搜索退後的理由

**「在板子上寫下你想突破的事」的用意**：
- 讓大腦把「打斷木板」和「突破那件事」在神經層面連結在一起
- 海馬體在那個瞬間接收的信號：「那個和我寫下的東西連結在一起的事，斷了」
- 是一個用身體語言重寫信念的技術——不是道理，是體驗

**板破之後**：
- 那個斷裂的聲音，是大腦接收到的確認信號：「它斷了。那個我以為打不破的東西，被我打破了。」
- 這個記憶存在神經系統裡，不需要「相信」它，它就是一個已經發生的事實

---

## 三、見證分享的三層神經科學功能

### 功能一：鏡像神經元共振

1990 年代，義大利 Rizzolatti 發現：猴子**觀察**另一隻猴子執行某個動作時，大腦中同樣的神經細胞激活。人類的鏡像神經元更精細——觀察他人情緒時，也會部分激活自己的情緒迴路。

當 Lori 說「板子斷掉的聲音響起」，台下學員不只在接收資訊，他們的神經系統在部分**重演**那個體驗。昨晚的板破記憶，被重新激活了一次。

### 功能二：情緒記憶的再鞏固

記憶不是錄影帶——每次提取，記憶進入「可重寫狀態（Memory Reconsolidation）」。今天早上這 12 分鐘的情緒輸入（被 Justina 感動、被 Tim 觸動），和昨晚的板破記憶融合，讓那個記憶以更豐富的情緒厚度重新鞏固。一年後，十年後，昨晚的記憶仍然清晰有力。

### 功能三：集體身份重新定義

當 Tim 說「我的理性有時候只是恐懼穿著西裝」，台下每個「以為自己很理性」的人都感到：「我也是。」

這個「不孤單」在心理上降低了改變的阻力——你不用克服額外的羞恥感，因為很多人都有同樣的模式。見證分享讓幾千個人，開始**共同重新定義「我是誰」**——不是由講師告訴你應該是什麼，而是由和你相似的人說出你心底的話，讓重新定義從內部長出來。

---

## 四、Renee Marino 開場——Day 2 主軸宣告

三個見證分享結束，Renee Marino 走上台，帶全場做身體切換動作（幾個刻意設計的姿勢和呼吸，用身體狀態改變標記課程新階段），然後說：

> *「昨天你們打破了一塊木板。今天，我們要打破更多東西——那些你以為是自己、但其實只是習慣的東西。」*

**這句話逐字解析**：
- 「昨天你們打破了一塊木板」——確認那是真實發生的事
- 「今天打破更多東西」——昨晚只是開始
- 「你以為是自己」——你以為是「我就是這樣的人」的那些限制
- 「但其實只是習慣的東西」——習慣是可以改變的，只要用新的行動重複夠多次

**今日兩位主講人**：
- **Brian Bradley**：Egoscue Method 首席執行長，身體排列科學。核心洞見：身體結構直接影響思維品質和情緒狀態
- **Joseph McClendon III**：神經心理學家、UCLA 教授，Tony 40 年核心夥伴。帶來改變神經迴路的工具：恐懼症快速治療、巔峰狀態建立、錨定技術

> *「改變不從頭腦開始。改變從身體開始，然後讓大腦跟上。這是今天整天的主軸。」*

---

## 五、UPW「身體先行」哲學

大多數個人發展課程採用**由上而下（Top-down）**改變：思維 → 情緒 → 行為。問題：要改變思維，你必須能「客觀看自己的思維」——但當你在負面情緒中，思維已被那個情緒染色。

UPW 採用**由下而上（Bottom-up）**改變：
- 先改變身體狀態（生理）
- 情緒自然跟著改變（心理）
- 從新的情緒狀態，思維看到不同的可能性（信念）

**神經科學基礎**：
- 情緒不只發生在大腦，是全身性事件
- 姿勢、呼吸、面部肌肉，既是情緒的**表達**，也是情緒的**輸入**
- Amy Cuddy 研究：高權力姿勢站立 2 分鐘 → 睪固酮上升 20%，皮質醇下降 25%

板破的本質：**用身體做到一件事，讓大腦接收到「我可以」的新數據。**

**來源**：0314-1.en.srt（00:12:00–00:40:00）
**主講人**：Brian Bradley（Egoscue Method 首席執行長）
**核心主題**：思想是細胞層次的事件、現代生活對身體的破壞、疼痛的上游根源、具體校準練習

---

## 一、第一句話：「你的想法，是細胞層次的事件」

Brian Bradley 走上台的方式本身就是示範——脊椎直立不僵硬、頭部水平、肩膀自然落下、步伐穩定有重量。和台下幾千人的走路方式有一種微妙但清晰的不同：**一個被校準的身體，看起來和感覺起來都不一樣。**

走到台前，他說的第一句話：

> **「Your thoughts are cellular events. What you think, your body is doing — right now, at a cellular level. Every single cell.」**
> （你的想法，是細胞層次的事件。你在想什麼，你的身體就在做什麼——就在現在這個時刻，每一個細胞。）

全場安靜了一下。這不是一個關於姿勢的句子，而是一個哲學性的宣告，說的對象是「思想」，不是「身體」。

---

## 二、思想是細胞性的——神經科學基礎

### Candace Pert 與神經肽

1980 年代，神經科學家 Candace Pert 研究阿片類物質受體時發現：**大腦分泌的神經肽（Neuropeptides），不只在大腦裡循環——全身細胞都有它們的受體。**

換言之：**你的身體在「傾聽」你的大腦在說什麼。**

- 恐懼 → 皮質醇、腎上腺素 → 心跳加快、肌肉緊繃、消化減慢、免疫降低
- 感恩、愛 → 催產素、血清素、內啡肽 → 血壓降低、肌肉放鬆、免疫提升

Pert 說：「你的身體就是你的潛意識。」

### 雙向影響

這個關係是**雙向的**：
- 大腦影響身體：你的想法，改變你的身體化學
- 身體影響大腦：你的身體狀態，改變你的大腦化學——進而影響你的想法

長期駝背、頭前傾的姿勢：
- 橫隔膜受壓 → 呼吸變淺 → 大腦供氧降低 → 思維清晰度下降
- 胸腔關閉 → 神經層面對應「防禦、退縮」→ 大腦接收「現在不安全」的信號
- 視線角度向下 → 心理研究顯示與負面情緒、反芻性思維的相關性更強

**你無法從一個功能失調的身體裡，長期維持一個強大的心理狀態。**

---

## 三、現代生活對身體的系統性破壞

人體在幾百萬年演化中，是為「持續多樣化的動作」設計的——走、跑、攀爬、蹲、挑重物。過去一百年，現代生活讓我們幾乎不動。

Brian 說一件讓人意外的事：**坐在椅子上，對人類的身體來說，是一個非常不自然的姿勢。**

人類祖先自然採取的休息姿勢是「蹲」——臀部、髖部、膝蓋在最佳功能角度。現代人每天在椅子上坐 8–12 小時，系統性地破壞了四個關鍵結構：

**破壞一：髖部屈肌縮短**
長時間坐著，髖部屈肌適應縮短長度變緊繃。站起來時，緊繃的髖部屈肌把腰椎向前拉 → 骨盆前傾、腰椎過度前凸 → **大多數下背痛的直接根源**。

**破壞二：臀大肌失能**
人體最大的肌群之一，長時間不工作。臀肌喪失神經激活能力，其他部位（膝蓋、髖關節、下背）被迫代償 → 慢性疼痛。

**破壞三：肩旋轉袖（科技姿勢）**
看手機、用電腦 → 頭向前伸、肩膀內旋、背部圓拱（Brian 稱之為「科技姿勢」）。肩旋轉袖長期壓縮 → 肩頸疼痛、活動受限、五十肩提早出現。同時胸腔關閉 → 呼吸能力降低。

**破壞四：橫隔膜壓縮**
身體前傾 → 腹部空間壓縮 → 橫隔膜無法完全下沉 → 呼吸自動變淺。
淺呼吸後果：氧氣攝入減少、二氧化碳排出不完全、交感神經持續輕微激活 → **「莫名的焦慮」或「睡醒了還是很累」**。

> 「很多人以為他們的焦慮問題是心理問題。但如果你讓他們學會正確地呼吸，焦慮的程度往往在幾分鐘內明顯降低。」

---

## 四、疼痛不是問題，疼痛是信使

> **「Pain is not the problem. Pain is the messenger. The problem is always upstream.」**
> （疼痛不是問題。疼痛是信使。問題永遠在上游。）

傳統醫學：膝蓋痛 → 治膝蓋；背痛 → 治背部。在急性傷害時正確，但對**慢性疼痛**——治的是信使，不是問題本身。

**膝蓋痛的完整路徑**：
\`\`\`
臀大肌失能（長期坐著）
  → 膝蓋代償臀肌的工作
    → 膝蓋承受超出設計的壓力
      → 軟骨磨損
        → 膝蓋痛
\`\`\`
只治膝蓋，疼痛暫時減輕，但根源未解決 → 幾個月後復發。Egoscue 的做法：從整體校準狀態入手，找到功能失調的上游。

**高爾夫比喻**：

> **「You cannot expect a misaligned body to produce a perfect swing. The swing starts with how you stand.」**

揮桿是一個完整的動力鏈：腳的重心 → 髖部旋轉 → 脊椎穩定 → 肩膀活動範圍 → 手腕 → 球桿頭。任何一個環節失衡，靠「更努力揮桿」無法補救。生活的任何表現領域都一樣——**問題永遠在上游**。

---

## 五、三個現場校準練習

### 練習一：百次手臂旋轉（100 Arm Circles）

**動作**：
- 雙腳與肩同寬，自然站立，膝蓋稍微放鬆
- 雙臂側平舉，**大拇指朝向天花板**（這個細節是核心）
- 以肩關節為圓心，畫圓形旋轉，從小圓到大圓
- 連續旋轉 100 次（前 50 次向前，後 50 次向後）

**為什麼大拇指朝上**：讓手臂外旋，肩膀自然打開，胸腔自然展開，對抗「科技姿勢」的慣性內旋。

**為什麼是 100 次**：

> 「少量的重複，只是在強化你已有的模式。10 次結束後，你的身體立刻回到它最熟悉的位置。你需要足夠的次數，告訴你的神經系統：這個新的位置，是正常的。」

這不是在鍛鍊肌肉力量——是在重新訓練神經路徑（「Neurons that fire together, wire together」）。

**你可能感受到的**：
- 肩膀後側的灼熱感 → 斜方肌中束、菱形肌被重新激活
- 胸腔的開放感 → 胸小肌被拉伸，「突然可以呼吸了」
- 輕微頸肩不適 → 不是傷害，是改變

---

### 練習二：頸部旋轉

**動作**：身體直立，慢慢把頭轉向右邊，下巴指向右肩，感受左側頸椎的拉伸感，停留 3 個呼吸。回到中間，轉向左邊。重複 3–5 次，讓活動範圍慢慢增加。

**為什麼重要**：
- 你的頭約 4–5 公斤
- 每前傾 2.5 公分，頸椎等效承重增加約 4.5 公斤
- 頭前傾 5 公分（現代辦公室工作者常見），頸椎每天承受相當於 20+ 公斤的重量
- 頸部旋轉讓頸椎重建自然活動範圍，改善椎動脈血流 → 做完後「頭更清」

---

### 練習三：閉眼單腳平衡評估

**動作**：閉眼，單腳站立，嘗試保持平衡 30 秒（左右各一次）。

**目的不是評斷，是讓你親身感受身體的校準狀態：**

> 「你的平衡能力，是你神經系統健康程度的即時讀數。當你閉眼站不穩，意味著：移除視覺線索後，你的神經系統無法單靠腳的感受和內耳整合信息維持平衡。那不是腿的問題，是神經系統整合的問題。」

---

## 六、「只在刷牙的日子運動」

Brian 在課程最後說了一句乍聽像玩笑的話：

> **「Exercise only on the days you brush your teeth.」**
> （只在你刷牙的日子運動。）

全場笑了。字面意思就是：**每天**。

但重點不在「每天」，而在於**把運動和刷牙放在同一個心理類別**：

- 你不會問自己「今天有沒有心情刷牙？」
- 你不會因為工作很忙就跳過刷牙
- 刷牙已成為你身份的一部分：「我是那種每天刷牙的人」

> 「大多數人把運動想成是需要特別安排、特別動力的事。那樣它就永遠不會變成習慣——而是情況理想時才做的事，而情況理想的時候，遠比你想像的少。」

**習慣形成研究的一致結論**：
- 習慣的持久性，和頻率的相關性，遠大於強度的相關性
- 每天 10 分鐘，持續一年，遠比每週一次 2 小時更穩定
- 每天做的事，才會成為你的身份認同

---

## 七、Brian 在 UPW 的意義

有人可能問：一個身體校準課程，為什麼出現在以「改變心智和人生」為主軸的課程裡？

Brian 在結尾回答了：

> 「你今天會從這個場館帶走很多工具——關於狀態、信念、決定。那些工具，在接下來的幾天、幾週、幾個月，你都需要有一個身體，能夠支撐你去使用它們。你的身體，是你所有行動發生的地方。一個功能失調的身體，會讓你的所有工具慢慢失效——不是因為工具不好，而是因為使用工具的人，被生理基礎設施拖住了。**你的身體，是你所有改變的地基。地基不穩，任何建築都難以持久。**」

## 一、他走上台的那一刻

Brian Bradley 的肩膀旋轉練習剛結束，舞台側翼出現一個人。

不是走上台——更像是「進入」台。音樂立刻改變節奏，更歡快，帶著邀請人張開身體去呼吸的感覺。他不高，但存在感讓這個事實完全無關緊要。

他抓起麥克風，停頓一秒，讓那個停頓把整個場館的注意力集中過來，然後說：

> *「大家好！我是 Joseph。Joseph McClendon III。我就是那個 5'9 的黑人，每次站在 6'7 的白人（Tony）旁邊的那個人。」*

全場笑聲——不是禮貌性的笑，是真正被逗到的笑。一句話包含了太多層次：幽默、自信、對自己外形的完全自在、與 Tony 的關係定位。這個人，從一開始就不尋常。

---

## 二、Joseph McClendon III 是誰

**頭銜**：
- 神經心理學家（Neuropsychologist）
- UCLA（加州大學洛杉磯分校）教授
- Tony Robbins Foundation 核心成員
- 與 Tony Robbins 合作超過 **30 年**

但這些頭銜背後有一個更重要的事實：他是一個**親身走過改變的人**，不是研究改變的旁觀者。

他在台上說：「我讀了超過 700 本書。不是因為我聰明，而是因為我有一個問題必須解答：**人是如何真正改變的？**」

這個問題的起源不是學術好奇——而是因為他自己需要改變。他成長的環境給他看到的世界，是「你在這裡，你就會在這裡」的世界。改變那個軌跡，他需要找到能相信的根基：不是勵志口號，是科學。

他走進 NLP 的世界，遇見了 John Grinder（NLP 共同創始人之一），最終進入 UCLA 把直覺應用和神經科學理論整合在一起。他台上說的每一件事都有兩層意義：一層是神經科學，一層是他自己活過的見證。

---

## 三、普通學習的問題在哪裡

在介紹四大條件前，Joseph 先說了一個讓很多人有點驚到的問題：

> **「大多數研討會的問題，不是內容不好。問題是，你的大腦在那個狀態下，根本沒有在學習。」**

記憶的形成需要幾個關鍵條件同時滿足：

### 條件 A：適度覺醒（Yerkes-Dodson 定律）

大腦學習效率遵循倒 U 形曲線：
- **覺醒太低**（無聊、疲憊）→ 大腦不投入，信息進入後馬上消散
- **覺醒太高**（焦慮、恐懼）→ 杏仁核劫持前額葉，學習通道關閉
- **覺醒適中**（興奮、好奇）→ 海馬迴高度活躍，記憶形成加速

傳統會議室學習的覺醒程度普遍偏低。UPW 的設計，是把數千人的覺醒程度精準維持在倒 U 的頂端。

### 條件 B：情感投入

**情感是記憶形成的催化劑**。杏仁核（情感處理中心）在強烈情感時，向海馬迴發出信號：「這個很重要，記住它。」

你記得十年前某個傷心下午朋友說的一句話，卻記不住昨天讀的技術手冊——情感強度決定記憶深度。

### 條件 C：身體參與

同時使用多個感官，大腦建立更多神經連結，同一個記憶有更多「提取路徑」。

> 「UPW 裡的音樂、舞蹈、身體動作、高強度互動——這些不是娛樂。這些是製造最適合學習的神經化學環境。當你的身體在動，你的大腦也在動。」

---

## 四、四大條件

### 條件一：全程享受樂趣（Have Fun）

> **「如果你現在不開心，你在浪費時間。你的大腦在恐懼或無聊的狀態下，根本不學習。」**

**多巴胺是大腦的「學習信號」**：

大腦在愉悅狀態下，多巴胺系統被激活。多巴胺不只是「感覺良好」——它是大腦的標記機制，在說：「把這個記住。這個有用。再做一次。」

當學習的過程是痛苦的，大腦學到的不是「內容」，而是「這種痛苦的感覺」——然後開始迴避這個主題。

Joseph 特別澄清「有趣不代表不認真」：

> 「我說的是，你允許自己感到興奮。允許自己感到期待。允許自己帶著一個孩子探索新世界的好奇心來學習。那是認真的，不是輕浮的。」

孩子學語言的速度讓科學家至今驚嘆——帶著完全投入和完全樂趣，沒有「學不好被人笑」的恐懼，只有純粹的好奇。Have Fun，是邀請你找回那個孩子的學習狀態。

---

### 條件二：全力投入（Play Full Out）

> **「半途而廢的學習是危險的——你只學到了問題，沒學到解方。全力投入，或者乾脆不要來。」**

**什麼是「保留投入度」**：
- 做一個練習時只做 60%，「看看效果再說」
- 某個信念被挑戰時，心裡先劃防線：「好，我試試，但我不確定我相信」
- 被要求分享時，選擇最安全的版本，而不是真實的版本

保留投入度的代價，是保留了改變的可能性。

**神經可塑性需要強度**：

「一起激發的神經元，一起連結」的延伸原理：神經回路的重新配置，需要足夠的激活強度。

就像在雪地裡走路——走了一次，留下淺淺的痕跡，下一場雪覆蓋了；走了一百次，才形成真正的小徑。用 50% 強度做新行為，留下 50% 深度的神經痕跡，風很快就能吹散。

Joseph 對「全力投入的恐懼」說：

> 「我知道你們有些人在想：如果我全力投入，然後結果不如預期呢？那不是更糟嗎？」
> 他說：「那個恐懼本身，就是你來這裡最需要面對的東西。保護自己不被失望，和保護自己不被改變，是同一件事。」

---

### 條件三：保持開放心態（Open Mind）

> **「如果你今天帶著『我已經知道了』的態度走進來，你確實知道了——你已經知道的那些東西。」**

**確認偏誤（Confirmation Bias）**：人傾向於只接收和原有信念相符的信息，自動過濾不符的。進入學習場域時這個機制不會自動關掉——如果你帶著「我已經知道改變的原理」進來，你的大腦會在聽到每個概念時，自動分類到「已知」或「不認同」，而不是讓它在神經系統裡展開。結果：三天後，帶著一疊確認既有信念的「筆記」，沒有任何真正的新迴路。

**禪的「初心（Shoshin）」**：

> 「在初學者的心中，有許多可能性；在專家的心中，可能性很少。」

「保持開放心態」不是要你忘記已有知識，而是**暫時放在旁邊，先讓新信息展開，後用你的知識評估它**。先體驗，後判斷。

Joseph 對台下成功人士說了一句讓全場安靜的話：

> **「你在商業上的成功，你的學歷，你的成就——所有這些，都是你過去的大腦建立的。如果你想要比現在更好的結果，你需要一個和過去不完全一樣的大腦。你的成就是最美麗的資產，也可能是你最隱形的阻礙。」**

---

### 條件四：允許被指導（Allow Yourself to Be Coached）

> **「教練能做到什麼，取決於你願意被帶到哪裡。」**

Joseph 問：「全世界最頂尖的網球選手，有教練嗎？」有。「奧運選手？歌手？演員？」有。「那你呢？」

允許被指導需要一種微妙的內在姿態：**承認「我現在的方式可以更好」，同時不讓這個承認傷害到你對自己的基本尊重。**

**自我概念是成長的隱形邊界**：

> 「人能接受的最大改變幅度，受到他的自我概念的邊界限制。如果你相信自己是年收入 100 萬的人，你可以輕鬆接受有人教你賺到 150 萬的方式。但如果有人告訴你，你可以賺 10 億，你的第一個反應是什麼？」

台下的笑聲裡帶著不安——大家都知道答案：「那不可能是在說我。」

那個「那不可能是在說我」，就是自我概念的邊界在運作。**允許被指導的最深層意義：允許有人帶你去看一個你還沒有相信自己能到達的地方，讓你的神經系統先走過去，然後再讓你的自我概念更新。**

---

## 五、Joseph 的兩個奇蹟故事

### 故事一：凌晨 Denny's 餐廳——NLP 第一次

Joseph 當時還很年輕，對 NLP 的掌握還是理論多於實踐。一個認識的人說有親戚有嚴重恐懼症，什麼辦法都試過了，沒有用。

Joseph 心裡有個小小恐慌——他知道理論，但從未真正獨立完成過一個完整的治療。但他說：「好。我來試試。」

他們約在一個 Denny's 餐廳，找了安靜的角落。那個人坐在他對面，帶著「你大概也沒辦法幫我，但隨便試試吧」的表情。

Joseph 使用 NLP 的次感元技術（Submodalities）：引導那個人把恐懼記憶在腦海中「呈現出來」，然後系統性地改變那個內在表征的屬性——圖像的大小、距離、顏色；聲音的音量和音調。通過改變大腦**處理**那個記憶的方式，改變它引發的神經反應。

大約 **15 分鐘**後，他讓那個人去想那個讓他恐懼的事物。

那個人愣了一下，試著重新喚起恐懼感，然後說：「等一下……我感覺不到它了。」

Joseph 說，那個當下，他自己也愣了一秒。

> *「那一刻，我知道這是真實的。不是課本上的理論，不是實驗室的數據。人的神經系統確實可以在幾分鐘內重新配置。那個發現改變了我的一生。」*

---

### 故事二：加拿大直播間的公開挑戰

隨著名氣傳開，Joseph 受邀到加拿大廣播節目訪談。節目準備了一位懷疑 NLP 的精神科醫師打算辯論。

Joseph 沒有選擇辯論。他說：「我們不用辯論。你找一個真正有恐懼症的聽眾進來，讓我在直播中幫他，你自己看。」

節目組真的找了一位有嚴重恐懼症的聽眾——多年試過各種治療方法都無效。他走進直播間時顯然很緊張。

在直播的鏡頭下，Joseph 花了 **10 到 15 分鐘**，用 NLP 技術引導那個人。當那個人走出去直接面對那個恐懼的事物時——那個他多年迴避的東西——他的恐懼反應消失了。

那位精神科醫師坐在旁邊，沉默了。

Joseph 說：

> *「我說這個，是因為我想讓你們知道：當你把科學和情感的力量結合在一起，不可能的事情可以很快就變成可能的。那個是你今天在這裡的理由——不是來聽我說話，而是來讓這件事在你自己身上發生。」*

---

## 六、學習環境比內容更重要

Joseph 的核心框架：

| 學習狀態 | 結果 |
|----------|------|
| 無聊 + 被動 | 信息進入工作記憶，48 小時內消散 70% |
| 有趣 + 全力投入 | 多巴胺強化記憶形成，情感錨定讓提取更容易 |
| 防衛 + 封閉 | 新信息被過濾或重新詮釋為已知，沒有真正的學習 |
| 開放 + 允許指導 | 大腦建立新的神經回路，真正的改變成為可能 |

> **「大多數人問的問題是：這個課程的內容好嗎？我問的問題是：你準備好接收這個內容了嗎？」**

他帶全場做了一個自我評估：右手放在心臟上，閉上眼睛，問自己：「今天早上我走進這個房間，我的真實狀態是什麼？我有多少是真的開放的？」

沉默 20 秒後，他說：「好。現在決定：從這一刻起，你選擇用什麼狀態繼續今天的旅程。」

**核心主題**：終極成功公式五步驟、注意力決定方向、Stallone 的洛基故事、Simon Says 模式中斷

## 一、成功是天賦，還是可以複製的模式

Joseph 問台下：「有多少人相信，有些人天生就比較容易成功？」很多手舉起來。

他說：「那是一個非常方便的故事——因為如果成功是天賦，你就不需要負責任。但如果成功是一套可以學習的模式呢？那個故事要求你負責。而很多人不想負責。」

**NLP 的根本假設**：傑出者的行為有可被識別、萃取、複製的結構。Tony 的結論：**你不需要發明一條新路，你需要找到走過這條路的人，學習他們的地圖。**

---

## 二、終極成功公式（Ultimate Success Formula）——五步驟

### 步驟一：清楚知道你的結果（Know Your Outcome）

> **「你的神經系統需要一個清晰的目的地。模糊的願望，只會產生模糊的結果。」**

**RAS（網狀激活系統）的工作原理**：
- 大腦每秒接收 200 萬以上的感官輸入，RAS 只讓「和你的重要事物相關」的信息進入意識
- 模糊目標 → RAS 不知道要找什麼 → 機會在眼前看不見
- 具體目標 → RAS 有清晰搜索標準 → 相關人、資訊、機會開始「自動出現」
- 這就是為什麼決定買某款車之後，突然路上到處都是那款車

**目標具體化的三個維度**：
1. **描述**：用感官語言——看起來像什麼、聽起來像什麼、感覺像什麼
2. **衡量**：有什麼可以測量的指標，知道自己到了
3. **時間**：不是「有一天」，是一個日期

---

### 步驟二：清楚知道你的原因（Know Your Reasons Why）

> **「你的原因必須強大到——即使在凌晨三點，疲憊到極點，依然能讓你爬起來繼續。」**

Jim Rohn 的話：「**Why comes first. How comes second.**（先有為什麼，再有怎麼做。）」

原因夠強，大腦會自動去找方法；原因不夠深，即使找到最好的方法，執行力遇到阻礙時也會崩潰。

**「為什麼」的力量等級**：
- 弱：「我想要更多錢」——抽象，沒有情感重量
- 中：「我想要財務自由」——有方向，仍然抽象
- 強：「我不想讓我的孩子在成長過程中，像我小時候那樣，一直活在繳不出房租的恐懼裡」——具體、連結情感記憶、有保護的動力

最強的原因，往往和這三種情感連結：對重要事物的愛、對某種情境的真實恐懼、對某種使命的深刻認同。

---

### 步驟三：採取大規模的行動（Take Massive Action）

> **「等到準備好了再行動——這是你買得起的最昂貴的謊言。」**

**小規模 vs. 大規模行動的差別**：
- 小規模：反饋太慢 → 等不到有效信號就放棄
- 大規模：快速產生密集反饋 → 知道哪些有用、哪些沒用、哪裡要調整

「做了再說」不是魯莽，是在**行動的過程中學習**，而不是在學習的過程中延遲行動。

---

### 步驟四：注意你正在得到什麼（Notice What You're Getting）

> **「沒有失敗，只有反饋。每一個結果都是信息。」**

把每一個「失敗」變成一堂具體的課，而不是對自己的負面評判：

- 普通反應：打了 10 通銷售電話沒成交 → 「我不擅長銷售」
- 第四步的反應：「這 10 個人在哪個環節拒絕的？有規律嗎？是開場、提問、還是報價？」

**愛迪生的例子**：試驗了近一萬種燈絲材料。有人問他失敗一萬次感覺如何，他說：「我沒有失敗。我找到了九千九百九十九種不行的方法。那是非常有價值的信息。」

**神經科學基礎**：大腦通過對比「預期」和「實際結果」的差異來學習。把結果視為信息而非審判，讓神經系統在中性狀態下處理這個對比，而不是在情緒崩潰中關閉學習通道。

---

### 步驟五：靈活調整你的做法（Change Your Approach）

> **「如果方法沒用，換方法，不是換目標。」**

遇到困難，很多人做的選擇是降低期望——「也許那個目標太高了」。但如果目標真的符合你的使命和價值觀，應該改的是**到達那個目標的路徑**，不是目標本身。

目標是固定的（至少在你重新評估之前），方法可以有無限多種。

---

## 三、電話桿比喻——你看哪裡，你就往哪裡走

> **「研究顯示，賽車手在高速轉彎時如果盯著護牆看，幾乎一定會撞上護牆。因為大腦和身體的協調系統，依照你的注意力焦點來引導方向。你看哪裡，你就往哪裡走。」**

他問台下：「你有多少時間，是花在想你**不想要**的事情上的？」

- 怕失敗、怕被拒絕、怕不夠好、怕別人的眼光、怕萬一……

每一個「怕」，都是注意力停在護牆上。RAS 把注意力焦點視為「這個重要，要多收集相關信息」的信號——你反覆思考不想要的事，RAS 就在環境中主動搜索符合那個恐懼的證據，讓你「發現」越來越多理由相信它是真的。

> 「成功的訓練，不是消除恐懼，而是學習更快速地把注意力帶回到你想要的地方。」

---

## 四、Sylvester Stallone 的故事——USF 的完整人類示範

### 最低的谷底

1975 年的 Sylvester Stallone，沒有家，沒有錢，沒有穩定的工作。他有過幾個小角色，但因為出生時面部神經受損導致嘴角鬆垂，每個製片人都婉拒了他。他在停車場打過工，在地鐵站賣過票。

然後來到了人生最暗的一個時刻：他養了一隻陪了他好幾年的狗，有一天口袋裡幾乎沒有錢，算了一下，買不起狗食了。

他站在寵物店外等著，一個陌生人停下來問多少錢。

他說：**40 美元**。

那個人付了錢，帶走了他的狗。Stallone 站在原地，看著狗被帶走。他說那是他這輩子哭得最厲害的一次。

### 那場改變一切的拳擊賽

大約兩週後，1975 年 3 月，他被朋友拉去看了一場拳擊賽：**穆罕默德・阿里對查克・韋普納**。

韋普納完全不被看好。但他被打、倒下、爬起來，繼續打，一直撐到了第 15 回合，才被技術性擊倒。

Stallone 在台下看著這一切，有什麼東西點燃了。不是對拳擊的熱愛，而是對那個故事的共鳴——一個沒有人相信的人，站在世界最頂端的對手面前，用盡全力，一直站到最後。

### 72 小時寫出洛基

他幾乎沒有離開那張桌子。**72 小時後**，他寫完了《洛基》的劇本。

那個劇本是他的故事：一個被所有人忽視的男人，在一個不可能的機會面前，選擇全力以赴。洛基就是他，那個最終的比賽是他對這個世界的宣告：「我在這裡。我值得被看見。」

### 三次談判，三次說不

他把劇本送到製片公司，一家一家被拒絕。終於有公司——Chartoff-Winkler Productions——認為這個故事有巨大潛力，打電話給他。

但他有一個條件：他要自己演主角。沒有談判空間。

**第一次出價：$25,000 美元**，條件是換演員。他拒絕。

公司陸續提高出價，換演員的名單包括了 Ryan O'Neal、Burt Reynolds、James Caan——當時的一線巨星。

**出價提高到 $100,000 美元**。他拒絕。

**出價提高到 $360,000 美元**。他拒絕。

後來，公司終於接受了他的條件，但給他的酬勞低到幾乎是象徵性的——**$35,000 美元**，導演給。

他說：好。

### 結局

《洛基》上映，票房 **$117,000,000 美元**。

電影獲得奧斯卡**最佳影片獎**。

Stallone 的名字，從沒有人認識，變成了全世界都知道的那個名字。

他做的第一件事：回去找那個當初買走他狗的人，用 **$15,000 美元** 把那隻狗買回來。

---

## 五、Simon Says——模式中斷示範

Joseph 帶全場玩了一個 Simon Says 遊戲——一個讓大家在笑聲中學到一件很嚴肅的事的練習。

遊戲結束後，他說：

**「你剛才做的那些動作，就是你每天在做的事的縮影。你在按照規則運作，但你沒有問那些規則從哪裡來、對不對。很多你認為是『我自己的決定』的事，其實是你在童年、在學校、在舊有關係裡，自動學會的反射——是別人的 Simon Says。」**

**打破自動化反應的三步驟**：
1. **察覺**：注意到你正在自動反應（「我又在這樣做了」）
2. **中斷**：停下來，哪怕只是一秒，不讓那個衝動直接轉化為行動
3. **新選擇**：主動選擇一個不同的反應

大多數人在一和三之間，少掉了二。沒有中斷，就沒有選擇的空間，只有習慣的重演。

## 一、一個讓心理學界不舒服的問題

Joseph 開場：

> **「改變，可以很快。非常快。幾分鐘。我知道你們有些人不相信這件事。我不需要你相信。我只需要讓你看見。」**

要理解為什麼這是可能的，必須先認識一個工具——NLP。

---

## 二、NLP 是什麼——建模方法論

**神經語言程式學（NLP）** 誕生於 1970 年代，加州大學聖塔克魯茲分校。

**兩位創始人**：
- **Richard Bandler**：電腦科學和哲學背景，把人類行為視為可分析、建模、複製的系統
- **John Grinder**：語言學教授，研究語言結構和溝通模式

他們的核心問題不是「心理問題從哪裡來」，而是：**「頂尖的人是怎麼做到頂尖的？能不能把那個結構萃取出來，教給別人？」**

**他們研究的三個人**：
- **Fritz Perls**：完形治療創始人，可以在短時間內讓人突破多年的心理障礙
- **Virginia Satir**：家庭治療先驅，和任何人說話都能建立深刻信任
- **Milton Erickson**：催眠治療頂尖人物，以違反常理的速度和效果完成治療

他們仔細觀察、紀錄、分析三人的工作——說了什麼、怎麼說、用什麼語氣、問了什麼問題——發現他們表面上風格完全不同，但底層操作有驚人的共同結構。那個共同結構，就是 NLP 的核心。

**NLP 名字的意義**：
- **Neuro（神經）**：所有行為和情感都是神經系統的結果，NLP 在神經層面直接操作
- **Linguistic（語言）**：語言是思維的接口，我們用語言組織對現實的詮釋
- **Programming（程式化）**：行為模式像電腦程式，可以被識別、被重寫

**NLP 根本主張**：你的神經系統不是命中注定的，它是可以被有意識地重新程式化的。
